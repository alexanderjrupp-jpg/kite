<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kite</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#6C5CE7">
<style>
  :root {
    --bg:#E9E5F6; --bgfx:linear-gradient(160deg,#E5DFF6 0%,#EDE3F3 55%,#E1E7F6 100%);
    --panel:#FFFFFF; --border:#E4E5F1; --soft:#EEEFF8;
    --text:#232838; --muted:#7B8296; --accent:#6C5CE7; --accent2:#F06BA8; --accent3:#14B8A6;
    --accsoft:rgba(108,92,231,.10);
    --sentbg:linear-gradient(135deg,#FFF6E1,#FFEFF7); --sentborder:#F0DFC0;
    --tipbg:#FFF6E1; --tipborder:#F0E1AF;
    --good:#2F8A3C; --bad:#C0392B; --chip:#FFFFFF; --empty:#DCDEF0; --emptyedit:#AEB5D8;
    --shadow:0 2px 6px rgba(80,70,150,.12);
    --surface:rgba(255,255,255,.55); --surfborder:rgba(255,255,255,.75); --glass:rgba(255,255,255,.72);
    --ambient:0 3px 10px rgba(80,70,150,.10);
    --kitetail:#22306E;
  }
  body.dark {
    --bg:#12141D; --bgfx:linear-gradient(160deg,#131522 0%,#1C1530 55%,#121A28 100%);
    --panel:#1B1E2B; --border:#2D3143; --soft:#252939;
    --text:#E9EBF4; --muted:#9BA2B6; --accent:#8B7CF7; --accent2:#F472B6; --accent3:#2DD4BF;
    --accsoft:rgba(139,124,247,.16);
    --sentbg:linear-gradient(135deg,#28223A,#2A1E30); --sentborder:#453B60;
    --tipbg:#2F2A1E; --tipborder:#4C4531;
    --good:#5BBF6A; --bad:#E07060; --chip:#252939; --empty:#2B2F42; --emptyedit:#4C5375;
    --shadow:0 2px 6px rgba(0,0,0,.45);
    --surface:rgba(27,30,43,.55); --surfborder:rgba(255,255,255,.07); --glass:rgba(37,41,57,.75);
    --ambient:0 3px 10px rgba(0,0,0,.35);
    --kitetail:#8DA2F2;
  }
  body.hc {
    --bg:#ffffff; --bgfx:none; --panel:#ffffff; --border:#000000; --soft:#e6e6e6;
    --text:#000000; --muted:#000000; --accent:#0000cc; --accent2:#a00050; --accent3:#006b5e;
    --accsoft:#d9d9ff;
    --sentbg:#ffffff; --sentborder:#000000; --tipbg:#ffffff; --tipborder:#000000;
    --good:#006b00; --bad:#a00000; --chip:#ffffff; --empty:#ffffff; --emptyedit:#000000;
    --shadow:none; --surface:#ffffff; --surfborder:#000000; --glass:#ffffff;
    --ambient:none; --kitetail:#000000;
  }
  body.hc #gridwrap { background:#ffffff; }
  body.hc #grid { gap:9px; }
  body.hc .cell .pic { border:3px solid #000; box-shadow:0 3px 0 #000; }
  body.hc .cell .lab { color:#000; font-weight:700; }
  body.hc .cell .foldmark, body.hc .cell .editmark { color:#000; }
  body.hc #sent .chip { border:2px solid #000; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
    font-family:ui-rounded,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); background-image:var(--bgfx); background-attachment:fixed;
    color:var(--text); -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none; transition:background .25s; }
  #app { display:flex; flex-direction:column; height:100%;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right); }

  /* Sentence bar */
  #topbar { display:flex; align-items:stretch; gap:6px; padding:10px 10px 4px; background:transparent; }
  #sent { flex:1; min-height:64px; display:flex; align-items:center; gap:6px; overflow-x:auto; padding:4px 10px; background:var(--sentbg); border:1px solid var(--sentborder); border-radius:16px; }
  #sent .chip { flex:0 0 auto; display:flex; flex-direction:column; align-items:center; padding:3px 8px; background:var(--chip); border:none; border-radius:12px; font-size:12px; cursor:pointer; max-width:90px; box-shadow:0 2px 0 var(--edge, var(--border)); }
  #sent .chip img { width:26px; height:26px; object-fit:contain; }
  #sent .chip .em { font-size:22px; line-height:26px; }
  #sent .hint { color:var(--muted); font-size:15px; }
  .tbtn { border:none; min-width:58px; padding:0 14px; border-radius:16px; font-size:20px; background:var(--glass); color:var(--text); cursor:pointer; box-shadow:var(--ambient); -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px); }
  .tbtn:active { filter:brightness(.92); transform:translateY(1px); }
  #spk { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-size:16px; font-weight:700; box-shadow:var(--shadow); }

  /* Nav bar */
  #navbar { display:flex; align-items:center; gap:8px; padding:6px 14px; background:transparent; color:var(--text); }
  #brand { display:flex; align-items:center; gap:6px; margin-right:2px; }
  #brand span { font-size:17px; font-weight:800; letter-spacing:.3px;
    background:linear-gradient(120deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  #brand svg { transform:rotate(8deg); }
  #navbar button { border:none; background:var(--accsoft); color:var(--accent); border-radius:999px; padding:7px 14px; font-size:14px; font-weight:700; cursor:pointer; }
  #crumb { font-size:17px; font-weight:800; flex:1; text-align:center;
    background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  #enote { font-size:12px; color:var(--muted); display:none; }

  /* Grid — frosted board surface the buttons live on */
  #gridwrap { flex:1; overflow:hidden; padding:10px; margin:2px 10px 4px; background:var(--surface); border:1px solid var(--surfborder);
    border-radius:26px; box-shadow:var(--ambient); -webkit-backdrop-filter:blur(18px); backdrop-filter:blur(18px); }
  #grid { display:grid; gap:6px; height:100%; }
  /* iPhone-home-screen style: squircle icon tile, label below on the wallpaper */
  .cell { position:relative; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:3px;
    cursor:pointer; text-align:center; overflow:visible; padding:1px; border:none; background:transparent; box-shadow:none; }
  .cell .pic { flex:1; width:100%; min-height:0; display:flex; align-items:center; justify-content:center;
    background:var(--tile, var(--panel)); border-radius:18px;
    border:2px solid var(--edge, var(--border));
    box-shadow:0 3px 0 var(--edge, transparent), var(--ambient);
    transition:transform .09s, box-shadow .09s; }
  .cell:active .pic { transform:translateY(3px); box-shadow:0 0 0 var(--edge, transparent), 0 1px 3px rgba(0,0,0,.12); }
  .cell .pic img { max-width:84%; max-height:88%; object-fit:contain; border-radius:12px; }
  .cell .pic .em { font-size:clamp(16px,4.4vmin,36px); line-height:1; }
  .cell .lab { font-size:clamp(9px,1.6vmin,13px); font-weight:600; line-height:1.32; width:100%; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cell.empty { cursor:default; }
  .cell.empty:active { transform:none; }
  .cell.empty.editing { border:1.5px dashed var(--emptyedit); border-radius:18px; cursor:pointer; }
  .cell.empty.editing::after { content:"+"; color:var(--emptyedit); font-size:22px; }
  .cell .foldmark { position:absolute; top:4px; right:8px; font-size:11px; color:var(--accent); font-weight:800; }
  .cell .editmark { position:absolute; top:4px; left:8px; font-size:11px; color:var(--muted); display:none; }
  body.editing .cell .editmark { display:block; }
  body.editing .cell { touch-action:none; }
  body.editing #gridwrap { touch-action:none; overscroll-behavior:contain; }

  /* Bottom bar */
  #botbar { display:flex; align-items:center; gap:8px; padding:4px 14px 8px; background:transparent; }
  #botbar button { border:none; background:var(--glass); border-radius:999px; padding:8px 16px; font-size:14px; font-weight:600; cursor:pointer; color:var(--text); box-shadow:var(--ambient); -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px); }
  #edit.on { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* Overlay / dialogs */
  #ov { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(10,12,22,.55); display:none; align-items:center; justify-content:center; padding:14px; z-index:50; }
  #ov.show { display:flex; }
  #ovbox { width:100%; max-width:420px; max-height:92vh; overflow-y:auto; background:var(--panel); color:var(--text); border-radius:20px; padding:18px; -webkit-user-select:auto; user-select:auto; }
  #ovbox h3 { margin:0 0 6px; font-size:18px; }
  #ovbox .sub { margin:0 0 12px; color:var(--muted); font-size:13px; }
  #ovbox label { display:block; font-size:13px; font-weight:600; color:var(--muted); margin:10px 0 4px; }
  #ovbox input[type=text], #ovbox input[type=password], #ovbox select, #ovbox textarea {
    width:100%; padding:10px; border:1px solid var(--border); border-radius:12px; font-size:16px; background:var(--panel); color:var(--text); }
  #ovbox input[type=range] { width:100%; accent-color:var(--accent); }
  .btnrow { display:flex; gap:8px; margin-top:14px; }
  .btn { flex:1; border:none; border-radius:14px; padding:12px; font-size:15px; font-weight:600; cursor:pointer; background:var(--soft); color:var(--text); }
  .btn.primary { background:var(--accent); color:#fff; }
  .btn.danger { background:rgba(192,57,43,.12); color:var(--bad); }
  .btn.ghost { background:var(--panel); border:1px solid var(--border); }
  .swatches { display:flex; flex-wrap:wrap; gap:6px; }
  .swatches .sw { width:34px; height:34px; border-radius:10px; cursor:pointer; border:2px solid transparent; }
  .swatches .sw.sel { border-color:var(--accent); }
  .tabs { display:flex; gap:4px; background:var(--soft); padding:4px; border-radius:12px; margin:6px 0 8px; }
  .tabs button { flex:1; border:none; padding:8px; border-radius:9px; font-weight:600; font-size:13px; cursor:pointer; background:transparent; color:var(--muted); }
  .tabs button.on { background:var(--panel); color:var(--text); box-shadow:var(--shadow); }
  #sres { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; max-height:180px; overflow-y:auto; margin-top:8px; }
  #sres button { border:1px solid var(--border); border-radius:12px; background:#fff; cursor:pointer; aspect-ratio:1; padding:4px; display:flex; align-items:center; justify-content:center; }
  #sres img { max-width:100%; max-height:100%; }
  /* read-along guide */
  #guidebar { display:none; align-items:center; gap:10px; margin:0 10px 4px; padding:8px 14px; background:var(--tipbg); border:1px solid var(--tipborder); border-radius:14px; font-size:14px; font-weight:600; }
  #guidebar .gword { font-size:17px; font-weight:800; color:var(--accent); }
  #guidebar button { margin-left:auto; border:none; background:var(--glass); border-radius:999px; padding:6px 12px; font-weight:700; cursor:pointer; color:var(--text); }
  .cell.guide-glow .pic { outline:3px solid var(--accent); animation:tbglow 1.1s ease-in-out infinite; }
  #homeBtn.guide-glow { outline:3px solid var(--accent); animation:tbglow 1.1s ease-in-out infinite; }
  /* stories + game */
  .sttile { display:flex; align-items:center; gap:6px; border:none; border-radius:14px; padding:8px 12px; font-size:16px; font-weight:600; cursor:pointer; color:var(--text); box-shadow:0 2px 0 var(--edge,transparent); }
  .sttile.st-done { opacity:.4; }
  .sttile.st-cur { outline:3px solid var(--accent); animation:tbglow 1.1s ease-in-out infinite; }
  .sttile.st-next { opacity:.75; filter:grayscale(.6); }
  @keyframes tbglow {
    0%,100% { transform:scale(1); box-shadow:0 2px 0 var(--edge,transparent), 0 0 0 0 rgba(108,92,231,.45); }
    50%     { transform:scale(1.07); box-shadow:0 2px 0 var(--edge,transparent), 0 0 16px 5px rgba(108,92,231,.35); }
  }
  .gtile { aspect-ratio:1; border:none; border-radius:20px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 0 var(--edge,transparent), var(--ambient); transition:transform .09s; }
  .gtile:active { transform:translateY(2px); }
  #spkeys .spk2 { flex:1; max-width:44px; min-width:26px; padding:11px 0; font-size:17px; font-weight:700; border:1px solid var(--tipborder); border-radius:10px; background:var(--tipbg); color:var(--text); cursor:pointer; }
  #spkeys .spk2:active { filter:brightness(.9); }
  .pinpad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:8px; }
  .pinpad button { padding:14px; font-size:20px; font-weight:600; border:1px solid var(--border); border-radius:14px; background:var(--panel); color:var(--text); cursor:pointer; }
  .note { font-size:12px; color:var(--muted); margin-top:8px; }
  #toast { position:fixed; left:50%; bottom:70px; transform:translateX(-50%); background:var(--text); color:var(--bg); padding:10px 18px; border-radius:999px; font-size:14px; display:none; z-index:60; max-width:90vw; text-align:center; box-shadow:var(--shadow); }
</style>
</head>

<script>
window.onerror = function(msg, src, line){
  try {
    var d = document.createElement("div");
    d.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:999;background:#c0392b;color:#fff;font:13px sans-serif;padding:8px 12px;text-align:center";
    d.textContent = "Kite hit an error — tell Claude: " + msg + " (line " + line + ")";
    document.body.appendChild(d);
  } catch(e){}
};
(function(){
"use strict";
var LS_KEY = "talkboard_v3";
var ROWS = 7, COLS = 12;

/* ---------- palette ---------- */
/* [light bg, light border, dark bg, dark border] */

  b:  ["#c9e5ff","#87c0f5","#20344c","#38587e"],   /* determiners blue */

};
function curTheme(){ return (board && board.settings && board.settings.theme) || (dev && dev.theme) || "light"; }
function curContrast(){ if (board && board.settings && board.settings.contrast !== undefined) return board.settings.contrast; return !!(dev && dev.contrast); }
function palColors(key){
  var col = PAL[key] || PAL.w;
  var dark = curTheme() === "dark";
  return [ dark ? col[2] : col[0], dark ? col[3] : col[1] ];
}

/* ---------- builders ---------- */
function W(l,e,c,s){ return {t:"w", l:l, e:e||"⬜", c:c||"w", s:s||null, img:null}; }
function F(l,e,tg,c,sp){ return {t:"f", l:l, e:e||"📁", c:c||"o", tg:tg, sp:(sp===true), img:null}; }
function G(l,sfx,c){ return {t:"g", l:l, e:"🧩", c:c||"o", sfx:sfx, img:null}; }
function CLEAR(){ return {t:"a", l:"CLEAR", e:"", c:"gr", a:"clear", img:null}; }

function rowsToCells(rows){
  var cells = {};

    for (var c=0; c<rows[r].length; c++){
      if (rows[r][c]) cells[r*COLS+c] = rows[r][c];
    }

  return cells;
}
function page(name, rows){ return { name:name, cells: rowsToCells(rows) }; }
function stubPage(name){
  var rows = [[BACK()],[],[],[],[],[],[CLEAR()]];
  return page(name, rows);
}

  function sp(name, items){

/* ---------- durable storage mirror (IndexedDB survives iOS cache cleanups) ---------- */
var idb = null;
function idbOpen(cb){
  if (!window.indexedDB){ cb(null); return; }
  try {
    var req = indexedDB.open("kite_db", 1);
    req.onupgradeneeded = function(){ req.result.createObjectStore("kv"); };
    req.onsuccess = function(){ idb = req.result; cb(idb); };
    req.onerror = function(){ cb(null); };
  } catch(e){ cb(null); }
}
function idbSet(key, val){
  if (!idb) return;
  try { idb.transaction("kv", "readwrite").objectStore("kv").put(val, key); } catch(e){}
}
function idbGet(key, cb){
  if (!idb){ cb(null); return; }
  try {
    var rq = idb.transaction("kv", "readonly").objectStore("kv").get(key);
    rq.onsuccess = function(){ cb(rq.result || null); };
    rq.onerror = function(){ cb(null); };
  } catch(e){ cb(null); }
}

/* ---------- speech ---------- */
var SPELL_OK = { "TV":1, "OK":1, "DVD":1, "ABC":1 };   /* things that SHOULD be spelled out */
function fixSpeech(t){
  return String(t).split(" ").map(function(w){
    var core = w.replace(/[^A-Za-z]/g, "");
    if (core.length > 1 && core === core.toUpperCase() && !SPELL_OK[core]) return w.toLowerCase();
    return w;
  }).join(" ");
}
var voices = [];
function loadVoices(){ voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if (window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
function speak(text){
  if (!text || !window.speechSynthesis) return;
  try {
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(fixSpeech(text));
    u.rate = board.settings.rate; u.pitch = board.settings.pitch; u.volume = (board.settings.vol === undefined ? 1 : board.settings.vol);
    if (board.settings.voice){
      for (var i=0;i<voices.length;i++){ if (voices[i].name === board.settings.voice){ u.voice = voices[i]; break; } }
    }
    speechSynthesis.speak(u);
  } catch(e){}
}
function speakAsync(text, cb){
  if (!text || !window.speechSynthesis){ if (cb) setTimeout(cb, 0); return; }
  try {
    var u = new SpeechSynthesisUtterance(fixSpeech(text));
    u.rate = board.settings.rate; u.pitch = board.settings.pitch; u.volume = (board.settings.vol === undefined ? 1 : board.settings.vol);
    if (board.settings.voice){
      for (var i=0;i<voices.length;i++){ if (voices[i].name === board.settings.voice){ u.voice = voices[i]; break; } }
    }
    var done = false;
    function fin(){ if (!done){ done = true; if (cb) cb(); } }
    u.onend = fin; u.onerror = fin;
    setTimeout(fin, 4000 + text.length * 90);   /* safety net */
    speechSynthesis.speak(u);
  } catch(e){ if (cb) setTimeout(cb, 0); }
}
/* plays a sequence of sentence items: recorded audio where available, TTS otherwise */
function playItems(items){
  if (!items.length) return;
  try { speechSynthesis.cancel(); } catch(e){}
  var i = 0, ttsRun = [];
  function flushTts(cb){
    if (!ttsRun.length){ cb(); return; }
    var txt = ttsRun.join(" "); ttsRun = [];
    speakAsync(txt, cb);
  }
  function next(){
    if (i >= items.length){ flushTts(function(){}); return; }
    var it = items[i++];
    if (it.au){
      flushTts(function(){
        var a = new Audio(it.au);
        a.volume = (board.settings.vol === undefined ? 1 : board.settings.vol);
        a.onended = next; a.onerror = next;
        var p = a.play(); if (p && p.catch) p.catch(next);
      });
    } else { ttsRun.push(it.say); next(); }
  }
  next();
}

var IRR = {

  er: { good:"better", bad:"worse", far:"farther", many:"more", little:"less" },

function applySuffix(word, sfx){
  var w = word;
  var lw = w.toLowerCase();
  if (IRR[sfx] && IRR[sfx][lw]) return IRR[sfx][lw];
  function cy(){ return /[^aeiou]y$/.test(w); }
  if (sfx === "s"){ if (/(s|x|z|ch|sh)$/.test(w)) return w+"es"; if (cy()) return w.slice(0,-1)+"ies"; return w+"s"; }
  if (sfx === "ed"){ if (/e$/.test(w)) return w+"d"; if (cy()) return w.slice(0,-1)+"ied"; return w+"ed"; }
  if (sfx === "en"){ if (/e$/.test(w)) return w+"n"; return w+"en"; }
  if (sfx === "ing"){ if (/[^aeiou]e$/.test(w)) return w.slice(0,-1)+"ing"; if (/[^aeiouwxy][aeiou][^aeiouwxy]$/.test(w)) return w+w.slice(-1)+"ing"; return w+"ing"; }
  if (sfx === "er"){ if (/e$/.test(w)) return w+"r"; if (cy()) return w.slice(0,-1)+"ier"; return w+"er"; }
  if (sfx === "est"){ if (/e$/.test(w)) return w+"st"; if (cy()) return w.slice(0,-1)+"iest"; return w+"est"; }
  if (sfx === "ly"){ if (cy()) return w.slice(0,-1)+"ily"; return w+"ly"; }
  return w + sfx;
}

/* ---------- drag & drop rearranging (edit mode only) ---------- */
var dragCand = null, dragGhost = null, dragOn = false, suppressClick = false;
function dragStartCand(e, idx, el){
  if (!editing) return;
  var t = (e.touches && e.touches[0]) || e;
  dragCand = { x: t.clientX, y: t.clientY, idx: idx, el: el };
}
function dragMove(e){
  if (!dragCand || !editing) return;
  var t = (e.touches && e.touches[0]) || e;
  if (!dragOn){
    if (Math.abs(t.clientX - dragCand.x) + Math.abs(t.clientY - dragCand.y) < 12) return;
    dragOn = true;
    var r = dragCand.el.getBoundingClientRect();
    dragGhost = dragCand.el.cloneNode(true);
    dragGhost.style.cssText = "position:fixed;width:"+r.width+"px;height:"+r.height+"px;z-index:100;pointer-events:none;opacity:.85;margin:0";
    document.body.appendChild(dragGhost);
    dragCand.el.style.opacity = .3;
  }
  if (e.cancelable) e.preventDefault();
  dragGhost.style.left = (t.clientX - dragGhost.offsetWidth/2) + "px";
  dragGhost.style.top  = (t.clientY - dragGhost.offsetHeight/2) + "px";
}
function dragEnd(e){
  if (!dragCand) return;
  if (!dragOn){ dragCand = null; return; }
  var t = (e.changedTouches && e.changedTouches[0]) || e;
  var el = document.elementFromPoint(t.clientX, t.clientY);
  while (el && !(el.classList && el.classList.contains("cell"))) el = el.parentElement;
  if (el && el.dataset && el.dataset.idx !== undefined){
    var s = dragCand.idx, tg = parseInt(el.dataset.idx, 10);
    if (!isNaN(tg) && tg !== s){
      var cells = board.pages[cur].cells;
      var moving = cells[s], other = cells[tg];
      if (moving){
        if (other) cells[s] = other; else delete cells[s];
        cells[tg] = moving;
        save();
        toast(other ? "Swapped the two buttons." : "Moved.");
      }
    }
  }
  if (dragGhost && dragGhost.parentElement) dragGhost.parentElement.removeChild(dragGhost);
  dragGhost = null; dragOn = false; dragCand = null;
  suppressClick = true;
  setTimeout(function(){ suppressClick = false; }, 350);
  render();
}
if (window.PointerEvent){
  document.addEventListener("pointermove", dragMove, { passive: false });
  document.addEventListener("pointerup", dragEnd);
} else {
  document.addEventListener("touchmove", dragMove, { passive: false });
  document.addEventListener("touchend", dragEnd);
}
function tapButton(idx, b){
  if (editing){ openEditor(idx, b); return; }
  /* press-and-hold filter: ignore quick accidental brushes */
  if (board.settings.hold && (Date.now() - lastDown) < board.settings.hold) return;
  if (b.t === "a"){
    if (b.a === "clear"){ sent = []; renderSent(); }
    else if (b.a === "back"){ goBack(); }
    else if (b.a === "spell"){ openSpell(); }
    return;
  }
  if (b.t === "g"){
    if (!sent.length) return;
    var last = sent[sent.length-1];
    var neu = applySuffix(last.say, b.sfx.replace(/^\+/,""));
    last.say = neu; last.l = neu; last.au = null;
    renderSent();
    logWord(neu);
    if (board.settings.instant) speak(neu);
    return;
  }
  if (b.t === "f"){
    if (b.sp){ pushWord(b); }
    stack.push(cur); cur = b.tg;
    if (!board.pages[cur]){ board.pages[cur] = stubPage(b.l); save(); }
    render();
    return;
  }
  pushWord(b);
  guideCheck(cur, idx);
}
function pushWord(b){
  var it = { l:b.l, say:(b.s || b.l), e:b.e, img:b.img, au:(b.au || null), c:(b.c || "w") };
  sent.push(it);
  renderSent();
  logWord(it.say);
  if (board.settings.instant) playItems([it]);
}

/* ---------- spelling keyboard ---------- */
var spellMode = "abc";
var PHON = { a:"ah", b:"buh", c:"kuh", d:"duh", e:"eh", f:"fuh", g:"gah", h:"huh", i:"ih", j:"juh", k:"kuh", l:"luh", m:"muh", n:"nuh", o:"aw", p:"puh", q:"kwuh", r:"ruh", s:"suh", t:"tuh", u:"uh", v:"vuh", w:"wuh", x:"kuhs", y:"yuh", z:"zuh" };
var LONGV = [["ā","ay"],["ē","ee"],["ī","eye"],["ō","oh"],["ū","you"]];
var PUNCT = [[".","period"],["?","question mark"],["!","exclamation mark"],[",","comma"],["'","apostrophe"],[":","colon"],[";","semicolon"]];
function openSpell(){
  spellBuf = "";
  spellMode = "abc";
  drawSpell();
}
function drawSpell(){
  var tabs = [["abc","ABC"],["phon","Phonics"],["num","123"],["punct","?! ."]];
  var tabHtml = tabs.map(function(t){
    return '<button class="' + (spellMode===t[0] ? "on" : "") + '" data-m="'+t[0]+'">'+t[1]+'</button>';
  }).join("");
  function key(label, val){ return '<button class="spk2" data-v="'+val+'">'+label+'</button>'; }
  var keys = "";
  if (spellMode === "num"){
    keys = '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">' +
      "1234567890".split("").map(function(d){ return key(d,d); }).join("") + '</div>' +
      '<div class="note">Digits chain into one number: 1, then 12, then 123.</div>';
  } else if (spellMode === "punct"){
    keys = '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">' +
      PUNCT.map(function(p){ return key(p[0], p[0]); }).join("") + '</div>' +
      '<div class="note">Punctuation changes how the sentence sounds — a ? makes it a question.</div>';
  } else if (board.settings.kbLayout === "abc"){
    var seq = [];
    "abcdefghijklmnopqrstuvwxyz".split("").forEach(function(ch){
      seq.push([ch, ch]);
      if (spellMode === "phon"){
        for (var li = 0; li < LONGV.length; li++){
          if (LONGV[li][0].normalize("NFD")[0] === ch) seq.push([LONGV[li][0], "LV:" + LONGV[li][1]]);
        }
      }
    });
    keys = '<div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:5px">' +
      seq.map(function(p){
        var hint = "";
        if (spellMode === "phon"){
          var h = p[1].indexOf("LV:") === 0 ? p[1].slice(3) : (PHON[p[0]] || "");
          hint = '<div style="font-size:9px;color:var(--muted);font-weight:600">' + h + '</div>';
        }
        return '<button class="spk2" data-v="' + p[1] + '" style="max-width:52px;min-width:40px"><div>' + p[0] + '</div>' + hint + '</button>';
      }).join("") + '</div>';
    if (spellMode === "phon") keys += '<div class="note">ABC order — every key shows its sound, and marked vowels (ā ē ī ō ū) sit next to their letter.</div>';
  } else {
    var qrows = ["qwertyuiop","asdfghjkl","zxcvbnm"];
    keys = qrows.map(function(r, i){
      return '<div style="display:flex;gap:5px;justify-content:center;margin-top:5px' + (i===2 ? ';padding:0 8%' : (i===1 ? ';padding:0 4%' : '')) + '">' +
        r.split("").map(function(ch){ return key(ch, ch); }).join("") + '</div>';
    }).join("");
    if (spellMode === "phon"){
      keys += '<div style="display:flex;gap:5px;justify-content:center;margin-top:8px">' +
        LONGV.map(function(v){ return key(v[0], "LV:"+v[1]); }).join("") + '</div>' +
        '<div class="note">Letters make their sounds. Top-marked vowels say their long sound.</div>';
    }
  }
  openOv('<h3>🔤 Keyboard <button id="kblay" style="float:right;border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer">' + (board.settings.kbLayout === "abc" ? "ABC → QWERTY" : "QWERTY → ABC") + '</button></h3>' +
    '<div id="spbuf" style="min-height:42px;font-size:24px;letter-spacing:1px;text-align:center;border:1px solid var(--border);border-radius:12px;padding:7px">'+esc(spellBuf)+'</div>' +
    '<div class="tabs" id="sptabs">'+tabHtml+'</div>' +
    '<div id="spkeys">'+keys+'</div>' +
    '<div style="display:flex;gap:6px;margin-top:10px">' +
      '<button class="btn ghost" id="spsp" style="flex:2">␣ Space</button>' +
      '<button class="btn ghost" id="spbk" style="flex:1">⌫</button>' +
      '<button class="btn ghost" id="sphear" style="flex:1">🔊</button></div>' +
    '<div class="btnrow"><button class="btn" id="spc">Cancel</button><button class="btn primary" id="spok">OK — say it</button></div>');
  Array.prototype.forEach.call(ovbox.querySelectorAll("#sptabs button"), function(bt){
    bt.addEventListener("click", function(){ spellMode = bt.getAttribute("data-m"); drawSpell(); });
  });
  ovbox.querySelector("#kblay").addEventListener("click", function(){
    board.settings.kbLayout = board.settings.kbLayout === "abc" ? "qwerty" : "abc";
    save(); drawSpell();
  });
  function upd(){ ovbox.querySelector("#spbuf").textContent = spellBuf; }
  Array.prototype.forEach.call(ovbox.querySelectorAll(".spk2"), function(bt){
    bt.addEventListener("click", function(){
      var v = bt.getAttribute("data-v");
      if (v.indexOf("LV:") === 0){ speak(v.slice(3)); return; }
      if (spellMode === "num"){
        spellBuf += v;
        var m = spellBuf.match(/(\d+)$/);
        speak(m ? m[1] : v);
      } else if (spellMode === "punct"){
        spellBuf += v;
        var pn = v;
        for (var i2 = 0; i2 < PUNCT.length; i2++) if (PUNCT[i2][0] === v) pn = PUNCT[i2][1];
        speak(pn);
      } else if (spellMode === "phon"){
        spellBuf += v;
        speak(PHON[v] || v);
      } else {
        spellBuf += v;
        speak(v);
      }
      upd();
    });
  });
  ovbox.querySelector("#spsp").addEventListener("click", function(){ spellBuf += " "; upd(); });
  ovbox.querySelector("#spbk").addEventListener("click", function(){ spellBuf = spellBuf.slice(0,-1); upd(); });
  ovbox.querySelector("#sphear").addEventListener("click", function(){ if (spellBuf) speak(spellBuf); });
  ovbox.querySelector("#spc").addEventListener("click", closeOv);
  ovbox.querySelector("#spok").addEventListener("click", function(){
    var t = spellBuf.trim();
    if (t){
      sent.push({ l:t, say:t, e:"🔤", img:null, c:"w" });
      renderSent();
      logWord(t);
      if (board.settings.instant) speak(t);
    }
    closeOv();
  });
}

/* ---------- ARASAAC ---------- */
function arasaacSearch(q, cb){
  var url = "https://api.arasaac.org/api/pictograms/en/search/" + encodeURIComponent(q);
  fetch(url).then(function(r){ return r.ok ? r.json() : []; }).then(function(list){
    list = (list || []).slice();
    list.sort(function(a,b2){ return (b2.aac?2:0)+(b2.aacColor?1:0) - ((a.aac?2:0)+(a.aacColor?1:0)); });
    cb(list.slice(0, 16).map(function(it){
      return "https://static.arasaac.org/pictograms/" + it._id + "/" + it._id + "_300.png";
    }));
  }).catch(function(){ cb(null); });
}
function urlToDataURL(url, maxPx, cb){
  fetch(url).then(function(r){ return r.blob(); }).then(function(blob){
    var fr = new FileReader();
    fr.onload = function(){
      var img = new Image();
      img.onload = function(){
        var sc = Math.min(1, maxPx / Math.max(img.width, img.height));
        var cv = document.createElement("canvas");
        cv.width = Math.round(img.width*sc); cv.height = Math.round(img.height*sc);
        cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
        try { cb(cv.toDataURL("image/png")); } catch(e){ cb(null); }
      };
      img.onerror = function(){ cb(null); };
      img.src = fr.result;
    };
    fr.onerror = function(){ cb(null); };
    fr.readAsDataURL(blob);
  }).catch(function(){ cb(null); });
}

/* ---------- bulk symbol download ---------- */
function bulkSymbols(){
  var queue = [];
  Object.keys(board.pages).forEach(function(pk){
    var cells = board.pages[pk].cells;
    Object.keys(cells).forEach(function(ci){
      var b = cells[ci];
      if (b && (b.t==="w" || b.t==="f") && !(b.img && b.img.d)) queue.push(b);
    });
  });
  if (!queue.length){ toast("All buttons already have symbols."); return; }
  openOv('<h3>Getting real symbols</h3><p class="sub">Downloading from ARASAAC and saving on this device so they work offline.</p>' +
    '<div id="bp" style="font-size:15px;font-weight:600">0 / '+queue.length+'</div>' +
    '<div style="height:10px;background:var(--soft);border-radius:99px;margin-top:8px"><div id="bbar" style="height:10px;width:0%;background:var(--accent);border-radius:99px"></div></div>' +
    '<div class="btnrow"><button class="btn" id="bstop">Stop</button></div>');
  var i = 0, stopped = false, got = 0;
  ovbox.querySelector("#bstop").addEventListener("click", function(){ stopped = true; closeOv(); save(); render(); });
  function step(){
    if (stopped) return;
    if (i >= queue.length){
      save(); render(); closeOv();
      toast("Done — "+got+" symbols saved for offline use.");
      return;
    }
    var b = queue[i++];
    var el1 = ovbox.querySelector("#bp"), el2 = ovbox.querySelector("#bbar");
    if (el1){ el1.textContent = i+" / "+queue.length+"  ("+esc(b.l)+")"; el2.style.width = Math.round(i/queue.length*100)+"%"; }
    arasaacSearch(b.l, function(urls){
      if (urls && urls.length){
        urlToDataURL(urls[0], 220, function(durl){
          if (durl){ b.img = { d:durl }; got++; }
          setTimeout(step, 120);
        });
      } else setTimeout(step, 120);
    });
  }
  step();
}

var fbCbs = null;
function initFirebase(cb){
  if (db){ cb(null); return; }
  if (!dev.fb){ cb("No Firebase config saved yet."); return; }
  if (fbCbs){ fbCbs.push(cb); return; }
  fbCbs = [cb];
  function done(err){ var q = fbCbs; fbCbs = null; q.forEach(function(f){ f(err); }); }
  var base = "https://www.gstatic.com/firebasejs/10.14.1/";
  loadScript(base+"firebase-app-compat.js", function(e1){
    if (e1){ done("Couldn’t load Firebase — check internet."); return; }
    loadScript(base+"firebase-auth-compat.js", function(e2){
      if (e2){ done("Couldn’t load Firebase auth."); return; }
      loadScript(base+"firebase-firestore-compat.js", function(e3){
        if (e3){ done("Couldn’t load Firestore."); return; }
        try {
          if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(dev.fb);
          var au = firebase.auth(), settled = false;
          au.onAuthStateChanged(function(user){
            if (settled) return;
            if (user){ settled = true; db = firebase.firestore(); done(null); }
            else { au.signInAnonymously().catch(function(err){ if (!settled){ settled = true; done("Sign-in failed: "+err.message+" — enable Anonymous sign-in in Firebase Authentication."); } }); }
          });
        } catch(err){ done("Config problem: "+err.message); }
      });
    });
  });
}
function friendlyAuth(e){
  var c = (e && e.code) || "";
  if (c === "auth/email-already-in-use") return "That email already has an account — use Sign in instead.";
  if (c === "auth/wrong-password" || c === "auth/invalid-credential") return "Wrong email or password.";
  if (c === "auth/user-not-found") return "No account with that email yet — create one instead.";
  if (c === "auth/invalid-email") return "That does not look like a valid email.";
  if (c === "auth/weak-password") return "Password should be at least 6 characters.";
  if (c === "auth/popup-blocked" || c === "auth/popup-closed-by-user" || c === "auth/cancelled-popup-request") return "Google sign-in was closed — try again.";
  if (c === "auth/operation-not-allowed") return "That sign-in method isn’t enabled in Firebase yet.";
  return (e && e.message) || "Something went wrong.";
}

    try {

      if (u && u.isAnonymous){

      if (b.img && b.img.d && b.img.id){ media[b.img.id] = b.img.d; cb2.img = { id: b.img.id }; }
      if (b.au && b.auId){ media[b.auId] = b.au; cb2.au = null; cb2.auRef = b.auId; }
    });
  });
  if (clean.settings) delete clean.settings.vol;   /* volume level stays per-device (inside synced limits) */
  delete clean.pin;                                 /* each device keeps its own PIN */
  return { clean: clean, media: media };
}
function resolveMedia(clean, cb){
  var local = {};
  Object.keys(board.pages || {}).forEach(function(pk){
    var cs = board.pages[pk].cells;
    Object.keys(cs).forEach(function(ci){
      var b = cs[ci];
      if (b.img && b.img.id && b.img.d) local[b.img.id] = b.img.d;
      if (b.auId && b.au) local[b.auId] = b.au;
    });
  });
  var need = {};
  Object.keys(clean.pages).forEach(function(pk){
    var cs = clean.pages[pk].cells;
    Object.keys(cs).forEach(function(ci){
      var b = cs[ci];
      if (b.img && b.img.id){ if (local[b.img.id]) b.img.d = local[b.img.id]; else need[b.img.id] = true; }
      if (b.auRef){ if (local[b.auRef]){ b.au = local[b.auRef]; b.auId = b.auRef; } else need[b.auRef] = true; }
    });
  });
  var ids = Object.keys(need), got = {};
  if (!ids.length){ cb(clean); return; }
  var i = 0;
  function fin(){
    Object.keys(clean.pages).forEach(function(pk){
      var cs = clean.pages[pk].cells;
      Object.keys(cs).forEach(function(ci){
        var b = cs[ci];
        if (b.img && b.img.id && got[b.img.id]) b.img.d = got[b.img.id];
        if (b.auRef && got[b.auRef]){ b.au = got[b.auRef]; b.auId = b.auRef; }
      });
    });
    cb(clean);
  }
  function step(){
    if (i >= ids.length){ fin(); return; }
    var id = ids[i++];
    db.collection("families").doc(dev.code).collection("media").doc(id).get()
      .then(function(snap){ if (snap.exists) got[id] = snap.data().d; step(); })
      .catch(step);
  }
  step();
}
function schedulePush(){
  if (!syncOn || applyingRemote) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushBoard, 1500);
}
function pushBoard(){
  if (!syncOn || !db) return;
  setStatus("Syncing…");
  var sm = stripMedia();
  try { localStorage.setItem(LS_KEY, JSON.stringify(board)); } catch(e){}
  var ids = Object.keys(sm.media).filter(function(id){ return !pushedIds[id]; });
  var i = 0;
  function step(){
    if (i >= ids.length){
      db.collection("families").doc(dev.code)
        .set({ board: JSON.stringify(sm.clean), rev: Date.now(), src: dev.id })
        .then(function(){ setStatus("Synced ✓"); })
        .catch(function(){ setStatus("Sync error — will retry on next change"); });
      return;
    }
    var id = ids[i++];
    db.collection("families").doc(dev.code).collection("media").doc(id).set({ d: sm.media[id] })
      .then(function(){
        pushedIds[id] = 1;
        try { localStorage.setItem("tb_pushed", JSON.stringify(pushedIds)); } catch(e){}
        step();
      }).catch(step);
  }
  step();
}
function startListen(){
  if (unsubBoard) unsubBoard();
  unsubBoard = db.collection("families").doc(dev.code).onSnapshot(function(snap){
    if (!snap.exists) return;
    var d = snap.data();
    if (d.src === dev.id) return;
    try {
      var clean = JSON.parse(d.board);
      applyingRemote = true;
      resolveMedia(clean, function(nb){
        nb.pin = board.pin;
        if (!nb.settings){ nb.settings = board.settings; }
        else {
          nb.settings.vol = board.settings.vol;
          if (voices.length && nb.settings.voice){
            var vOk = false;
            for (var vi = 0; vi < voices.length; vi++){ if (voices[vi].name === nb.settings.voice) vOk = true; }
            if (!vOk) nb.settings.voice = board.settings.voice;
          }
        }
        if (!nb.targets) nb.targets = board.targets || [];
        board = nb;
        try { ensureShape(); } catch(e){}
        try { localStorage.setItem(LS_KEY, JSON.stringify(board)); } catch(e){}
        if (!board.pages[cur]){ cur = "home"; stack = []; }
        applyTheme();
        renderSent(); render();
        setStatus("Synced ✓"); toast("Board updated ✓");
        applyingRemote = false;
      });
    } catch(e){ applyingRemote = false; }
  }, function(){ setStatus("Sync offline — device still works"); });
}

function queueUsage(w){

function flushUsage(){

function connectFamily(mode, code, cb){

/* guided read-along: lights the real path on the board (eat -> Fruit -> kiwi) */
var guide = null;
function bfsPath(wordKey){
  var prev = { home: null }, q = ["home"];
  while (q.length){
    var p = q.shift();
    var cells = board.pages[p] ? board.pages[p].cells : {};
    var ci, b;
    for (ci in cells){
      b = cells[ci];
      if (b.t === "w" && b.l.toLowerCase() === wordKey){
        var steps = [{ page: p, idx: parseInt(ci,10) }];
        var node = p;
        while (prev[node]){ steps.unshift(prev[node]); node = prev[node].page; }
        return steps;
      }
    }
    for (ci in cells){
      b = cells[ci];
      if (b.t === "f" && board.pages[b.tg] && !(b.tg in prev)){
        prev[b.tg] = { page: p, idx: parseInt(ci,10) };
        q.push(b.tg);
      }
    }
  }
  return null;
}
function playStory(s){
  closeOv();
  cur = "home"; stack = [];
  guide = { title: s.title, toks: s.text.split(/\s+/).filter(Boolean), pos: -1, path: null };
  advanceGuide();
}
function updateGuideBar(){
  var gb = document.getElementById("guidebar");
  if (!guide){ gb.style.display = "none"; gb.innerHTML = ""; return; }
  gb.style.display = "flex";
  gb.innerHTML = '📖 <span>' + esc(guide.title) + '</span>&nbsp;·&nbsp;find: <span class="gword">' + esc(guide.toks[guide.pos]) + '</span>' +
    '<span style="color:var(--muted)">' + (guide.pos + 1) + ' / ' + guide.toks.length + '</span>' +
    '<button id="gstopb">✕ Stop</button>';
  document.getElementById("gstopb").addEventListener("click", endGuide);
}
function endGuide(){
  guide = null;
  updateGuideBar();
  render();
}
function advanceGuide(){
  var lead = [];
  while (true){
    guide.pos++;
    if (guide.pos >= guide.toks.length){
      if (lead.length) speak(lead.join(" "));
      finishGuide(); return;
    }
    var tok = guide.toks[guide.pos];
    var key = tokenKey(tok);
    var path = key ? bfsPath(key) : null;
    if (!path){ lead.push(tok); continue; }   /* words not on the board are read aloud automatically */
    guide.path = path;
    break;
  }
  var leadTxt = lead.join(" ");
  setTimeout(function(){
    if (!guide) return;
    var pr = board.settings.storyPrompts !== false;
    if (leadTxt) speakAsync(leadTxt, function(){ if (guide && pr) speak("Find " + guide.toks[guide.pos]); });
    else if (pr) speak("Find " + guide.toks[guide.pos]);
  }, 1500);
  updateGuideBar();
  render();
}
function finishGuide(){
  var wf = guide && guide.wf;
  var rt = guide && guide.rt;
  guide = null; updateGuideBar(); render();
  if (wf){ toast("🎉 Found it!"); speak("You found it!"); return; }
  if (rt){ openOv('<h3>🎉 Routine done!</h3><div style="text-align:center;font-size:42px;margin:10px 0">🌟 🎉 🌟</div><p class="sub" style="text-align:center;font-size:15px">You practiced every word — great talking!</p><div class="btnrow"><button class="btn primary" id="stdone">Done</button></div>'); setTimeout(function(){ speak("Great talking!"); }, 1200); ovbox.querySelector("#stdone").addEventListener("click", closeOv); return; }
  openOv('<h3>📖 The end!</h3><div style="text-align:center;font-size:42px;margin:10px 0">🎉 ⭐ 🎉</div><p class="sub" style="text-align:center;font-size:15px">Great reading!</p><div class="btnrow"><button class="btn primary" id="stdone">Done</button></div>');
  setTimeout(function(){ speak("The end! Great reading!"); }, 1200);
  ovbox.querySelector("#stdone").addEventListener("click", closeOv);
}
function guideGlow(){
  var hb = document.getElementById("homeBtn");
  hb.classList.remove("guide-glow");
  if (!guide || !guide.path) return;
  var stepIdx = null;
  for (var i = 0; i < guide.path.length; i++){
    if (guide.path[i].page === cur){ stepIdx = guide.path[i].idx; break; }
  }
  if (stepIdx !== null){
    var el = grid.querySelector('[data-idx="' + stepIdx + '"]');
    if (el) el.classList.add("guide-glow");

  }
  var cells = board.pages[cur].cells, backIdx = null;
  Object.keys(cells).forEach(function(ci){
    if (backIdx === null && cells[ci].t === "a" && cells[ci].a === "back") backIdx = ci;

    var el2 = grid.querySelector('[data-idx="' + backIdx + '"]');

  } else hb.classList.add("guide-glow");
}

function gameRound(){

    if (hits.length) target = hits[Math.floor(Math.random()*hits.length)];
  }
  if (!target) target = pool[Math.floor(Math.random()*pool.length)];

  }
  for (var i = opts.length-1; i > 0; i--){
    var j = Math.floor(Math.random()*(i+1));
    var tmp = opts[i]; opts[i] = opts[j]; opts[j] = tmp;
  }
  var colsN = opts.length <= 4 ? 2 : 3;

    var pc = palColors(b.c);

  }).join("");

    '<div style="display:flex;align-items:center;gap:8px;margin:6px 0">' +
      '<button class="btn ghost" id="ghear" style="flex:0 0 auto;padding:8px 14px">🔊</button>' +
      '<div style="font-size:19px;font-weight:700">Find: '+esc(target.l)+'</div></div>' +
    '<div style="display:grid;grid-template-columns:repeat('+colsN+',1fr);gap:10px">'+tiles+'</div>' +
    '<div class="btnrow"><button class="btn" id="gstop">Done playing</button></div>');
  function say(){ speak("Find " + target.l); }
  say();
  ovbox.querySelector("#ghear").addEventListener("click", say);
  ovbox.querySelector("#gstop").addEventListener("click", closeOv);
  var solved = false;
  Array.prototype.forEach.call(ovbox.querySelectorAll(".gtile"), function(bt){
    bt.addEventListener("click", function(){
      if (solved) return;
      if (bt.getAttribute("data-l") === target.l){
        solved = true;
        addStar(); gStreak++;
        if (gStreak === 3 && gCount < 6) gCount = 6;
        else if (gStreak === 6 && gCount < 9) gCount = 9;
        bt.style.outline = "4px solid var(--good)";
        bt.style.transform = "scale(1.06)";
        speak("Yes! " + target.l + "!");
        setTimeout(gameRound, 1100);
      } else {
        gStreak = 0;
        bt.style.opacity = .3;
        say();
      }
    });
  });
}

/* ---------- Model With Me: routine coach ---------- */
var ROUTINES = [
  { n:"Bedtime", e:"🌙", w:["tired","read","more","goodnight"], p:"read more",
    lv:["tired read more goodnight","I tired read more goodnight now","I am tired let's read more time to say goodnight"],
    t:"While tucking in, tap each word and say it. Read a page, model read more, then wait." },
  { n:"Snack time", e:"🍎", w:["eat","more","want","finished"], p:"want more",
    lv:["eat more want finished","I want eat more all finished","I want to eat I want more I am all finished"],
    t:"Hold the snack, model eat. Give a little. Model more before handing over more. Tap finished at the end." },
  { n:"Mealtime", e:"🍽️", w:["eat","drink","more","finished"], p:"more drink",
    lv:["eat drink more finished","I eat I drink more please finished","I want to eat I want a drink more please I am finished"],
    t:"Narrate the meal: eat, drink. Offer two choices and model both words before he picks." },
  { n:"Bath time", e:"🛁", w:["water","in","help","finished"], p:"in water",
    lv:["water in help finished","in the water help me all finished","I get in the water help me please I am all finished"],
    t:"Model in as each toy goes in the tub. Splash and comment — bath talk is play, not testing." },
  { n:"Car ride", e:"🚗", w:["go","stop","fast","look"], p:"go fast",
    lv:["go stop fast look","go fast please stop look there","let's go fast please stop look over there"],
    t:"Model go when the light changes, stop at stop signs. Point out the window and tap look." },
  { n:"Playground", e:"🌳", w:["play","up","down","more"], p:"up more",
    lv:["play up down more","I play go up go down more please","I want to play go up high go down more turn please"],
    t:"Model up as the swing rises, down on the slide. One word per push — rhythm builds words." },
  { n:"School pickup", e:"🎒", w:["happy","school","what","do"], p:"what do",
    lv:["happy school what do","I happy at school what you do","I am happy at school what did you do today"],
    t:"Instead of quizzing, model your own day: I do work. I happy. Then wait." },
  { n:"Morning", e:"🌞", w:["up","wear","eat","go"], p:"wear this",
    lv:["up wear eat go","get up wear this eat now go outside","time to get up I wear this I eat breakfast let's go"],
    t:"Model up at wake-up, wear while offering two shirts, go heading out the door." },
  { n:"Feelings check", e:"🎭", w:["feel","happy","sad","mad"], p:"I feel happy",
    lv:["feel happy sad mad","I feel happy I feel sad I feel mad","I feel happy today are you sad why are you mad"],
    t:"Model YOUR feelings first: I feel tired. Kids learn feeling words by hearing them used honestly." },
  { n:"Play time", e:"🎲", w:["play","want","more","stop"], p:"play more",
    lv:["play want more stop","I want play more please stop now","I want to play more turn please stop now"],
    t:"Follow his lead. Model more before restarting a game he loves. Model stop and actually stop." }
];
function openCoach(){
  var chips = ROUTINES.map(function(r, i){
    return '<button class="btn ghost rch" data-i="'+i+'" style="flex:0 0 auto;padding:10px 12px;font-size:14px">'+r.e+' '+esc(r.n)+'</button>';
  }).join("");
  openOv('<h3>🧭 Model With Me</h3><p class="sub">Pick a routine — you get 3\u20134 words to model and a simple script. Modeling means YOU tap and talk. No quizzing, no pressure.</p>' +
    '<div style="display:flex;flex-wrap:wrap;gap:8px">'+chips+'</div>' +
    '<div class="btnrow"><button class="btn" id="cc">Close</button></div>');
  Array.prototype.forEach.call(ovbox.querySelectorAll(".rch"), function(bt){
    bt.addEventListener("click", function(){ coachDetail(ROUTINES[parseInt(bt.getAttribute("data-i"),10)]); });
  });
  ovbox.querySelector("#cc").addEventListener("click", openSettings);
}
function coachDetail(r){
  var lvl = board.settings.routineLevel || 1;
  var lvlName = ["Single words","Short phrases","Sentences"][lvl-1];
  var toks = routineToks(r);
  var ix = wordIndex();
  var chips = toks.map(function(w){
    var b = ix[w.toLowerCase()];
    if (b){ var pc = palColors(b.c); return '<span style="border-radius:10px;padding:6px 10px;font-size:15px;font-weight:700;color:var(--text);background:'+pc[0]+';box-shadow:0 2px 0 '+pc[1]+'">'+(b.e && b.e!=="⬜" ? b.e+" " : "")+esc(w)+'</span>'; }
    return '<span style="padding:6px 10px;font-size:15px;color:var(--muted)">'+esc(w)+'</span>';
  }).join(" ");
  openOv('<h3>'+r.e+' '+esc(r.n)+' <span style="font-size:12px;color:var(--muted);font-weight:600">· '+lvlName+'</span></h3>' +
    '<label>Tap Start, then follow the glow through every word — do the whole routine</label>' +
    '<div style="display:flex;flex-wrap:wrap;gap:6px;margin:6px 0;align-items:center">'+chips+'</div>' +
    '<label>Try this</label><div style="font-size:15px;background:var(--tipbg);border:1px solid var(--tipborder);border-radius:12px;padding:10px 12px">'+esc(r.t)+'</div>' +
    '<div class="note">Set the level (single words → phrases → sentences) in Settings. Golden rules: model without expecting anything back · wait 10 seconds · respond to every tap like it is talking.</div>' +
    '<div class="btnrow"><button class="btn" id="cb">← Routines</button><button class="btn primary" id="cstart">▶ Start</button></div>');
  ovbox.querySelector("#cb").addEventListener("click", openCoach);
  ovbox.querySelector("#cstart").addEventListener("click", function(){ startRoutine(r); });
}
function routineToks(r){
  var lvl = board.settings.routineLevel || 1;
  var txt = (r.lv && r.lv[lvl-1]) || r.w.join(" ");
  return txt.split(/\s+/).filter(Boolean);
}
function startRoutine(r){
  closeOv();
  cur = "home"; stack = [];
  guide = { title: r.n, toks: routineToks(r), pos: -1, path: null, rt: true };
  advanceGuide();
}

/* ---------- settings ---------- */
document.getElementById("setBtn").addEventListener("click", function(){
  askPin(openSettings);
});
function openSettings(){
  var vopts = '<option value="">System default</option>';
  var en = voices.filter(function(v){ return /^en/i.test(v.lang); });
  (en.length ? en : voices).forEach(function(v){
    vopts += '<option value="'+esc(v.name)+'"'+(board.settings.voice===v.name?" selected":"")+'>'+esc(v.name)+' ('+esc(v.lang)+')</option>';
  });
  openOv('<h3>Settings</h3>' +
    '<div style="background:var(--tipbg);border:1px solid var(--tipborder);border-radius:12px;padding:10px 12px;font-size:13px;margin-bottom:6px"><b>💡 Today’s idea:</b> '+esc(todayTip())+'</div>' +
    '<button class="btn ghost" id="rep" style="width:100%;margin-top:6px">📊 Weekly report &amp; target words</button>' +
    '<button class="btn ghost" id="syncb" style="width:100%;margin-top:6px">☁ Phone sync '+(syncOn ? "· connected ✓" : "· set up")+'</button>' +
    '<button class="btn ghost" id="coachb" style="width:100%;margin-top:6px">🧭 Model With Me — routine coach</button>' +
    '<label>Routine level — how routines build up</label><select id="rlv">' +
      '<option value="1"'+((board.settings.routineLevel||1)===1?" selected":"")+'>Single words</option>' +
      '<option value="2"'+(board.settings.routineLevel===2?" selected":"")+'>Short phrases</option>' +
      '<option value="3"'+(board.settings.routineLevel===3?" selected":"")+'>Sentences</option></select>' +
    '<div class="note" style="margin-top:8px">These settings sync to every family device — you can tune the child\u2019s setup from your phone. Volume level and the PIN stay per-device.</div>' +
    '<label>Voice</label><select id="vv">'+vopts+'</select>' +
    '<div class="note">Tip: on iPad, download a free “Enhanced” voice in Settings → Accessibility → Spoken Content → Voices for a much more natural child voice — it will appear in this list.</div>' +
    '<label>Voice pitch: <span id="pvv">'+board.settings.pitch.toFixed(1)+'</span> (higher = younger)</label>' +
    '<input type="range" id="sp" min="0.6" max="1.8" step="0.1" value="'+board.settings.pitch+'">' +
    '<label>Speaking speed: <span id="rvv">'+board.settings.rate.toFixed(1)+'</span>×</label>' +
    '<input type="range" id="sr" min="0.5" max="1.4" step="0.1" value="'+board.settings.rate+'">' +
    '<label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="si"'+(board.settings.instant?" checked":"")+' style="width:auto"> Speak each word when tapped</label>' +
    '<label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="sgp"'+(board.settings.storyPrompts!==false?" checked":"")+' style="width:auto"> Story voice prompts (“Find …”) — the glow always stays on</label>' +
    '<label>Button size</label><select id="bsz">' +
      '<option value="fit"'+(board.settings.size==="fit"?" selected":"")+'>Fit screen (whole board visible — like LAMP)</option>' +
      '<option value="large"'+(board.settings.size==="large"?" selected":"")+'>Large (bigger targets, board scrolls)</option>' +
      '<option value="xl"'+(board.settings.size==="xl"?" selected":"")+'>Extra large (easiest to hit, board scrolls)</option></select>' +
    '<label>Press-and-hold to select</label><select id="bhold">' +
      '<option value="0"'+(!board.settings.hold?" selected":"")+'>Off — instant tap</option>' +
      '<option value="300"'+(board.settings.hold===300?" selected":"")+'>Short hold (0.3s)</option>' +
      '<option value="600"'+(board.settings.hold===600?" selected":"")+'>Long hold (0.6s)</option></select>' +
    '<div class="note">Hold-to-select ignores quick accidental brushes — a button only speaks when pressed deliberately. Both settings are per-device, so they won’t change other devices.</div>' +
    '<label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="shc"'+(curContrast()?" checked":"")+' style="width:auto"> High-contrast mode (bold outlines, black text — easier to see)</label>' +
    '<button class="btn ghost" id="tv" style="width:100%;margin-top:10px">▶ Test voice</button>' +
    '<hr style="border:none;border-top:1px solid var(--soft);margin:16px 0">' +
    '<label>Loudest allowed: <span id="vxv">'+Math.round(board.settings.volMax*100)+'%</span></label>' +
    '<input type="range" id="svx" min="0.3" max="1" step="0.1" value="'+board.settings.volMax+'">' +
    '<label>Quietest allowed: <span id="vnv">'+Math.round(board.settings.volMin*100)+'%</span></label>' +
    '<input type="range" id="svn" min="0" max="0.8" step="0.05" value="'+board.settings.volMin+'">' +
    '<div class="note">The 🔊 button on the board can only move volume between these limits — 100 taps can’t break them.</div>' +
    '<button class="btn ghost" id="printb" style="width:100%;margin-top:10px">🖨 Print low-tech backup</button>' +
    '<button class="btn ghost" id="bulk" style="width:100%">🖼️ Get real symbols for all buttons (ARASAAC)</button>' +
    '<div class="btnrow"><button class="btn ghost" id="exp">⬇ Export backup</button><button class="btn ghost" id="imp">⬆ Import</button></div>' +
    '<div class="btnrow"><button class="btn ghost" id="pinc">Change PIN</button><button class="btn ghost" id="rst">Reset board…</button></div>' +
    '<div class="btnrow"><button class="btn primary" id="sd">Done</button></div>');
  ovbox.querySelector("#rep").addEventListener("click", openReport);
  ovbox.querySelector("#syncb").addEventListener("click", openSyncDlg);
  ovbox.querySelector("#coachb").addEventListener("click", openCoach);
  ovbox.querySelector("#rlv").addEventListener("change", function(){ board.settings.routineLevel = parseInt(this.value,10); save(); });
  ovbox.querySelector("#vv").addEventListener("change", function(){ board.settings.voice = this.value; save(); });
  ovbox.querySelector("#sp").addEventListener("input", function(){ board.settings.pitch = parseFloat(this.value); ovbox.querySelector("#pvv").textContent = board.settings.pitch.toFixed(1); save(); });
  ovbox.querySelector("#sr").addEventListener("input", function(){ board.settings.rate = parseFloat(this.value); ovbox.querySelector("#rvv").textContent = board.settings.rate.toFixed(1); save(); });
  ovbox.querySelector("#si").addEventListener("change", function(){ board.settings.instant = this.checked; save(); });
  ovbox.querySelector("#sgp").addEventListener("change", function(){ board.settings.storyPrompts = this.checked; save(); });
  ovbox.querySelector("#bsz").addEventListener("change", function(){ board.settings.size = this.value; save(); render(); });
  ovbox.querySelector("#bhold").addEventListener("change", function(){ board.settings.hold = parseInt(this.value,10); save(); });
  ovbox.querySelector("#shc").addEventListener("change", function(){ dev.contrast = this.checked; saveDev(); applyTheme(); render(); });
  ovbox.querySelector("#tv").addEventListener("click", function(){ speak("Hi! I want to play outside."); });
  ovbox.querySelector("#svx").addEventListener("input", function(){ board.settings.volMax = parseFloat(this.value); clampVol(); ovbox.querySelector("#vxv").textContent = Math.round(board.settings.volMax*100)+"%"; save(); });
  ovbox.querySelector("#svn").addEventListener("input", function(){ board.settings.volMin = parseFloat(this.value); clampVol(); ovbox.querySelector("#vnv").textContent = Math.round(board.settings.volMin*100)+"%"; save(); });
  ovbox.querySelector("#printb").addEventListener("click", printBoard);
  ovbox.querySelector("#bulk").addEventListener("click", bulkSymbols);
  ovbox.querySelector("#exp").addEventListener("click", exportBoard);
  ovbox.querySelector("#imp").addEventListener("click", function(){ document.getElementById("importIn").click(); });
  ovbox.querySelector("#pinc").addEventListener("click", changePin);
  ovbox.querySelector("#rst").addEventListener("click", resetMenu);
  ovbox.querySelector("#sd").addEventListener("click", closeOv);
}
function changePin(){
  openOv('<h3>Change PIN</h3><label>New 4-digit PIN</label><input type="password" id="np" maxlength="4" inputmode="numeric" pattern="[0-9]*">' +
    '<div class="btnrow"><button class="btn" id="c1">Cancel</button><button class="btn primary" id="c2">Save</button></div>');
  ovbox.querySelector("#c1").addEventListener("click", openSettings);
  ovbox.querySelector("#c2").addEventListener("click", function(){
    var v = ovbox.querySelector("#np").value;
    if (/^\d{4}$/.test(v)){ board.pin = v; save(); toast("PIN updated."); openSettings(); }
    else toast("PIN must be 4 digits.");
  });
}
function resetMenu(){
  openOv('<h3>Reset board</h3><p class="sub">This replaces everything on this device with a fresh starter board. Export a backup first if unsure.</p>' +
    '<button class="btn ghost" id="r2" style="width:100%">Load clean starter board</button>' +
    '<div class="btnrow"><button class="btn" id="rc">Cancel</button></div>');
  ovbox.querySelector("#r2").addEventListener("click", function(){ board = starterBoard(); ensureShape(); save(); cur="home"; stack=[]; sent=[]; renderSent(); render(); closeOv(); toast("Loaded starter board."); });
  ovbox.querySelector("#rc").addEventListener("click", openSettings);
}
function exportBoard(){
  var blob = new Blob([JSON.stringify(board, null, 1)], {type:"application/json"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "kite-backup-" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  toast("Backup exported.");
}
document.getElementById("importIn").addEventListener("change", function(){
  var f = this.files && this.files[0]; this.value = "";
  if (!f) return;
  var fr = new FileReader();
  fr.onload = function(){
    try {
      var nb = JSON.parse(fr.result);
      if (!nb || !nb.pages || !nb.pages.home) throw 0;
      board = nb; ensureShape(); applyTheme(); save(); cur="home"; stack=[]; sent=[]; renderSent(); render(); closeOv();
      toast("Board imported.");
    } catch(e){ toast("That file isn’t a TalkBoard backup."); }
  };
  fr.readAsText(f);
});

/* ---------- init: open durable store, restore if needed, then start ---------- */
function startApp(){
  loadDev();
  load();
  ensureShape();
  applyTheme();
  renderSent();
  render();
  if (dev.fb && dev.code){
    setStatus("Connecting…");
    initFirebase(function(err){
      if (err){ setStatus("Sync offline — device still works"); return; }
      syncOn = true; startListen(); setStatus("Synced ✓");
    });
  }
  if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0){
    try { navigator.serviceWorker.register("sw.js").catch(function(){}); } catch(e){}
  }
}
idbOpen(function(){
  var rawBoard = null;
  try { rawBoard = localStorage.getItem(LS_KEY); } catch(e){}
  if (rawBoard){ startApp(); return; }
  /* primary storage is empty — restore everything from the durable mirror */
  idbGet(LS_KEY, function(vb){
    if (vb){ try { localStorage.setItem(LS_KEY, vb); } catch(e){} }
    idbGet(DEV_KEY, function(vd){
      if (vd){ try { if (!localStorage.getItem(DEV_KEY)) localStorage.setItem(DEV_KEY, vd); } catch(e){} }
      idbGet(LOG_KEY, function(vl){
        if (vl){ try { if (!localStorage.getItem(LOG_KEY)) localStorage.setItem(LOG_KEY, vl); } catch(e){} }
        startApp();
        if (vb) toast("Board restored from backup storage ✓");
      });
    });
  });
});
})();
</script>
