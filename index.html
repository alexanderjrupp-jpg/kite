<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kite</title>
<style>
  :root {
    --bg:#E9E5F6; --bgfx:linear-gradient(160deg,#E5DFF6 0%,#EDE3F3 55%,#E1E7F6 100%);
    --panel:#FFFFFF; --border:#E4E5F1; --soft:#EEEFF8;
    --text:#232838; --muted:#7B8296; --accent:#6C5CE7; --accent2:#F06BA8; --accent3:#14B8A6;
    --accsoft:rgba(108,92,231,.10);
    --sentbg:linear-gradient(135deg,#FFF6E1,#FFEFF7); --sentborder:#F0DFC0;
    --tipbg:#FFF6E1; --tipborder:#F0E1AF;
    --good:#2F8A3C; --bad:#C0392B; --chip:#FFFFFF; --empty:#DCDEF0; --emptyedit:#AEB5D8;
    --shadow:0 2px 6px rgba(80,70,150,.12);
    --surface:rgba(255,255,255,.55); --surfborder:rgba(255,255,255,.75); --glass:rgba(255,255,255,.72);
    --ambient:0 3px 10px rgba(80,70,150,.10);
    --kitetail:#22306E;
  }
  body.dark {
    --bg:#12141D; --bgfx:linear-gradient(160deg,#131522 0%,#1C1530 55%,#121A28 100%);
    --panel:#1B1E2B; --border:#2D3143; --soft:#252939;
    --text:#E9EBF4; --muted:#9BA2B6; --accent:#8B7CF7; --accent2:#F472B6; --accent3:#2DD4BF;
    --accsoft:rgba(139,124,247,.16);
    --sentbg:linear-gradient(135deg,#28223A,#2A1E30); --sentborder:#453B60;
    --tipbg:#2F2A1E; --tipborder:#4C4531;
    --good:#5BBF6A; --bad:#E07060; --chip:#252939; --empty:#2B2F42; --emptyedit:#4C5375;
    --shadow:0 2px 6px rgba(0,0,0,.45);
    --surface:rgba(27,30,43,.55); --surfborder:rgba(255,255,255,.07); --glass:rgba(37,41,57,.75);
    --ambient:0 3px 10px rgba(0,0,0,.35);
    --kitetail:#8DA2F2;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
    font-family:ui-rounded,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); background-image:var(--bgfx); background-attachment:fixed;
    color:var(--text); -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none; transition:background .25s; }
  #app { display:flex; flex-direction:column; height:100%;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right); }

  /* Sentence bar */
  #topbar { display:flex; align-items:stretch; gap:6px; padding:10px 10px 4px; background:transparent; }
  #sent { flex:1; min-height:64px; display:flex; align-items:center; gap:6px; overflow-x:auto; padding:4px 10px; background:var(--sentbg); border:1px solid var(--sentborder); border-radius:16px; }
  #sent .chip { flex:0 0 auto; display:flex; flex-direction:column; align-items:center; padding:3px 8px; background:var(--chip); border:none; border-radius:12px; font-size:12px; cursor:pointer; max-width:90px; box-shadow:0 2px 0 var(--edge, var(--border)); }
  #sent .chip img { width:26px; height:26px; object-fit:contain; }
  #sent .chip .em { font-size:22px; line-height:26px; }
  #sent .hint { color:var(--muted); font-size:15px; }
  .tbtn { border:none; min-width:58px; padding:0 14px; border-radius:16px; font-size:20px; background:var(--glass); color:var(--text); cursor:pointer; box-shadow:var(--ambient); -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px); }
  .tbtn:active { filter:brightness(.92); transform:translateY(1px); }
  #spk { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-size:16px; font-weight:700; box-shadow:var(--shadow); }

  /* Nav bar */
  #navbar { display:flex; align-items:center; gap:8px; padding:6px 14px; background:transparent; color:var(--text); }
  #brand { display:flex; align-items:center; gap:6px; margin-right:2px; }
  #brand span { font-size:17px; font-weight:800; letter-spacing:.3px;
    background:linear-gradient(120deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  #brand svg { transform:rotate(8deg); }
  #navbar button { border:none; background:var(--accsoft); color:var(--accent); border-radius:999px; padding:7px 14px; font-size:14px; font-weight:700; cursor:pointer; }
  #crumb { font-size:17px; font-weight:800; flex:1; text-align:center;
    background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  #enote { font-size:12px; color:var(--muted); display:none; }

  /* Grid — frosted board surface the buttons live on */
  #gridwrap { flex:1; overflow:hidden; padding:10px; margin:2px 10px 4px; background:var(--surface); border:1px solid var(--surfborder);
    border-radius:26px; box-shadow:var(--ambient); -webkit-backdrop-filter:blur(18px); backdrop-filter:blur(18px); }
  #grid { display:grid; gap:6px; height:100%; }
  /* iPhone-home-screen style: squircle icon tile, label below on the wallpaper */
  .cell { position:relative; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:3px;
    cursor:pointer; text-align:center; overflow:visible; padding:1px; border:none; background:transparent; box-shadow:none; }
  .cell .pic { flex:1; width:100%; min-height:0; display:flex; align-items:center; justify-content:center;
    background:var(--tile, var(--panel)); border-radius:18px;
    border:2px solid var(--edge, var(--border));
    box-shadow:0 3px 0 var(--edge, transparent), var(--ambient);
    transition:transform .09s, box-shadow .09s; }
  .cell:active .pic { transform:translateY(3px); box-shadow:0 0 0 var(--edge, transparent), 0 1px 3px rgba(0,0,0,.12); }
  .cell .pic img { max-width:84%; max-height:88%; object-fit:contain; border-radius:12px; }
  .cell .pic .em { font-size:clamp(16px,4.4vmin,36px); line-height:1; }
  .cell .lab { font-size:clamp(9px,1.6vmin,13px); font-weight:600; line-height:1.1; width:100%; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cell.empty { cursor:default; }
  .cell.empty:active { transform:none; }
  .cell.empty.editing { border:1.5px dashed var(--emptyedit); border-radius:18px; cursor:pointer; }
  .cell.empty.editing::after { content:"+"; color:var(--emptyedit); font-size:22px; }
  .cell .foldmark { position:absolute; top:4px; right:8px; font-size:11px; color:var(--accent); font-weight:800; }
  .cell .editmark { position:absolute; top:4px; left:8px; font-size:11px; color:var(--muted); display:none; }
  body.editing .cell .editmark { display:block; }
  body.editing .cell { touch-action:none; }

  /* Bottom bar */
  #botbar { display:flex; align-items:center; gap:8px; padding:4px 14px 8px; background:transparent; }
  #botbar button { border:none; background:var(--glass); border-radius:999px; padding:8px 16px; font-size:14px; font-weight:600; cursor:pointer; color:var(--text); box-shadow:var(--ambient); -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px); }
  #edit.on { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* Overlay / dialogs */
  #ov { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(10,12,22,.55); display:none; align-items:center; justify-content:center; padding:14px; z-index:50; }
  #ov.show { display:flex; }
  #ovbox { width:100%; max-width:420px; max-height:92vh; overflow-y:auto; background:var(--panel); color:var(--text); border-radius:20px; padding:18px; -webkit-user-select:auto; user-select:auto; }
  #ovbox h3 { margin:0 0 6px; font-size:18px; }
  #ovbox .sub { margin:0 0 12px; color:var(--muted); font-size:13px; }
  #ovbox label { display:block; font-size:13px; font-weight:600; color:var(--muted); margin:10px 0 4px; }
  #ovbox input[type=text], #ovbox input[type=password], #ovbox select, #ovbox textarea {
    width:100%; padding:10px; border:1px solid var(--border); border-radius:12px; font-size:16px; background:var(--panel); color:var(--text); }
  #ovbox input[type=range] { width:100%; accent-color:var(--accent); }
  .btnrow { display:flex; gap:8px; margin-top:14px; }
  .btn { flex:1; border:none; border-radius:14px; padding:12px; font-size:15px; font-weight:600; cursor:pointer; background:var(--soft); color:var(--text); }
  .btn.primary { background:var(--accent); color:#fff; }
  .btn.danger { background:rgba(192,57,43,.12); color:var(--bad); }
  .btn.ghost { background:var(--panel); border:1px solid var(--border); }
  .swatches { display:flex; flex-wrap:wrap; gap:6px; }
  .swatches .sw { width:34px; height:34px; border-radius:10px; cursor:pointer; border:2px solid transparent; }
  .swatches .sw.sel { border-color:var(--accent); }
  .tabs { display:flex; gap:4px; background:var(--soft); padding:4px; border-radius:12px; margin:6px 0 8px; }
  .tabs button { flex:1; border:none; padding:8px; border-radius:9px; font-weight:600; font-size:13px; cursor:pointer; background:transparent; color:var(--muted); }
  .tabs button.on { background:var(--panel); color:var(--text); box-shadow:var(--shadow); }
  #sres { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; max-height:180px; overflow-y:auto; margin-top:8px; }
  #sres button { border:1px solid var(--border); border-radius:12px; background:#fff; cursor:pointer; aspect-ratio:1; padding:4px; display:flex; align-items:center; justify-content:center; }
  #sres img { max-width:100%; max-height:100%; }
  /* read-along guide */
  #guidebar { display:none; align-items:center; gap:10px; margin:0 10px 4px; padding:8px 14px; background:var(--tipbg); border:1px solid var(--tipborder); border-radius:14px; font-size:14px; font-weight:600; }
  #guidebar .gword { font-size:17px; font-weight:800; color:var(--accent); }
  #guidebar button { margin-left:auto; border:none; background:var(--glass); border-radius:999px; padding:6px 12px; font-weight:700; cursor:pointer; color:var(--text); }
  .cell.guide-glow .pic { outline:3px solid var(--accent); animation:tbglow 1.1s ease-in-out infinite; }
  #homeBtn.guide-glow { outline:3px solid var(--accent); animation:tbglow 1.1s ease-in-out infinite; }
  /* stories + game */
  .sttile { display:flex; align-items:center; gap:6px; border:none; border-radius:14px; padding:8px 12px; font-size:16px; font-weight:600; cursor:pointer; color:var(--text); box-shadow:0 2px 0 var(--edge,transparent); }
  .sttile.st-done { opacity:.4; }
  .sttile.st-cur { outline:3px solid var(--accent); animation:tbglow 1.1s ease-in-out infinite; }
  .sttile.st-next { opacity:.75; filter:grayscale(.6); }
  @keyframes tbglow {
    0%,100% { transform:scale(1); box-shadow:0 2px 0 var(--edge,transparent), 0 0 0 0 rgba(108,92,231,.45); }
    50%     { transform:scale(1.07); box-shadow:0 2px 0 var(--edge,transparent), 0 0 16px 5px rgba(108,92,231,.35); }
  }
  .gtile { aspect-ratio:1; border:none; border-radius:20px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 0 var(--edge,transparent), var(--ambient); transition:transform .09s; }
  .gtile:active { transform:translateY(2px); }
  .pinpad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:8px; }
  .pinpad button { padding:14px; font-size:20px; font-weight:600; border:1px solid var(--border); border-radius:14px; background:var(--panel); color:var(--text); cursor:pointer; }
  .note { font-size:12px; color:var(--muted); margin-top:8px; }
  #toast { position:fixed; left:50%; bottom:70px; transform:translateX(-50%); background:var(--text); color:var(--bg); padding:10px 18px; border-radius:999px; font-size:14px; display:none; z-index:60; max-width:90vw; text-align:center; box-shadow:var(--shadow); }
</style>
</head>

</div>
<div id="ov"><div id="ovbox"></div></div>
<div id="toast"></div>
<input type="file" id="photoIn" accept="image/*" style="display:none">
<input type="file" id="importIn" accept=".json,application/json" style="display:none">

<script>
window.onerror = function(msg, src, line){
  try {
    var d = document.createElement("div");
    d.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:999;background:#c0392b;color:#fff;font:13px sans-serif;padding:8px 12px;text-align:center";
    d.textContent = "Kite hit an error — tell Claude: " + msg + " (line " + line + ")";
    document.body.appendChild(d);
  } catch(e){}
};

function rowsToCells(rows){
  var cells = {};

var voices = [];
function loadVoices(){ voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if (window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
function speak(text){
  if (!text || !window.speechSynthesis) return;
  try {
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.rate = board.settings.rate; u.pitch = board.settings.pitch;
    if (board.settings.voice){
      for (var i=0;i<voices.length;i++){ if (voices[i].name === board.settings.voice){ u.voice = voices[i]; break; } }
    }
    speechSynthesis.speak(u);
  } catch(e){}
}
function speakAsync(text, cb){
  if (!text || !window.speechSynthesis){ if (cb) setTimeout(cb, 0); return; }
  try {
    var u = new SpeechSynthesisUtterance(text);
    u.rate = board.settings.rate; u.pitch = board.settings.pitch;
    if (board.settings.voice){
      for (var i=0;i<voices.length;i++){ if (voices[i].name === board.settings.voice){ u.voice = voices[i]; break; } }
    }
    var done = false;
    function fin(){ if (!done){ done = true; if (cb) cb(); } }
    u.onend = fin; u.onerror = fin;
    setTimeout(fin, 4000 + text.length * 90);   /* safety net */
    speechSynthesis.speak(u);
  } catch(e){ if (cb) setTimeout(cb, 0); }
}
/* plays a sequence of sentence items: recorded audio where available, TTS otherwise */
function playItems(items){
  if (!items.length) return;
  try { speechSynthesis.cancel(); } catch(e){}
  var i = 0, ttsRun = [];
  function flushTts(cb){
    if (!ttsRun.length){ cb(); return; }
    var txt = ttsRun.join(" "); ttsRun = [];
    speakAsync(txt, cb);
  }
  function next(){
    if (i >= items.length){ flushTts(function(){}); return; }
    var it = items[i++];
    if (it.au){
      flushTts(function(){
        var a = new Audio(it.au);
        a.onended = next; a.onerror = next;
        var p = a.play(); if (p && p.catch) p.catch(next);
      });
    } else { ttsRun.push(it.say); next(); }
  }
  next();
}

/* ---------- grammar endings ---------- */
function applySuffix(word, sfx){
  var w = word;
  function cy(){ return /[^aeiou]y$/.test(w); }
  if (sfx === "s"){ if (/(s|x|z|ch|sh)$/.test(w)) return w+"es"; if (cy()) return w.slice(0,-1)+"ies"; return w+"s"; }
  if (sfx === "ed"){ if (/e$/.test(w)) return w+"d"; if (cy()) return w.slice(0,-1)+"ied"; return w+"ed"; }
  if (sfx === "en"){ if (/e$/.test(w)) return w+"n"; return w+"en"; }
  if (sfx === "er"){ if (/e$/.test(w)) return w+"r"; if (cy()) return w.slice(0,-1)+"ier"; return w+"er"; }
  if (sfx === "est"){ if (/e$/.test(w)) return w+"st"; if (cy()) return w.slice(0,-1)+"iest"; return w+"est"; }
  if (sfx === "ly"){ if (cy()) return w.slice(0,-1)+"ily"; return w+"ly"; }
  return w + sfx;
}

var dragCand = null, dragGhost = null, dragOn = false, suppressClick = false;
function dragStartCand(e, idx, el){
  if (!editing) return;
  var t = (e.touches && e.touches[0]) || e;
  dragCand = { x: t.clientX, y: t.clientY, idx: idx, el: el };
}
function dragMove(e){
  if (!dragCand || !editing) return;
  var t = (e.touches && e.touches[0]) || e;
  if (!dragOn){
    if (Math.abs(t.clientX - dragCand.x) + Math.abs(t.clientY - dragCand.y) < 12) return;
    dragOn = true;
    var r = dragCand.el.getBoundingClientRect();
    dragGhost = dragCand.el.cloneNode(true);
    dragGhost.style.cssText = "position:fixed;width:"+r.width+"px;height:"+r.height+"px;z-index:100;pointer-events:none;opacity:.85;margin:0";
    document.body.appendChild(dragGhost);
    dragCand.el.style.opacity = .3;
  }
  if (e.cancelable) e.preventDefault();
  dragGhost.style.left = (t.clientX - dragGhost.offsetWidth/2) + "px";
  dragGhost.style.top  = (t.clientY - dragGhost.offsetHeight/2) + "px";
}
function dragEnd(e){
  if (!dragCand) return;
  if (!dragOn){ dragCand = null; return; }
  var t = (e.changedTouches && e.changedTouches[0]) || e;
  var el = document.elementFromPoint(t.clientX, t.clientY);
  while (el && !(el.classList && el.classList.contains("cell"))) el = el.parentElement;
  if (el && el.dataset && el.dataset.idx !== undefined){
    var s = dragCand.idx, tg = parseInt(el.dataset.idx, 10);
    if (!isNaN(tg) && tg !== s){
      var cells = board.pages[cur].cells;
      var moving = cells[s], other = cells[tg];
      if (moving){
        if (other) cells[s] = other; else delete cells[s];
        cells[tg] = moving;
        save();
        toast(other ? "Swapped the two buttons." : "Moved.");
      }
    }
  }
  if (dragGhost && dragGhost.parentElement) dragGhost.parentElement.removeChild(dragGhost);
  dragGhost = null; dragOn = false; dragCand = null;
  suppressClick = true;
  setTimeout(function(){ suppressClick = false; }, 350);
  render();
}
if (window.PointerEvent){
  document.addEventListener("pointermove", dragMove, { passive: false });
  document.addEventListener("pointerup", dragEnd);
} else {
  document.addEventListener("touchmove", dragMove, { passive: false });
  document.addEventListener("touchend", dragEnd);
}
function tapButton(idx, b){
  if (editing){ openEditor(idx, b); return; }
  /* press-and-hold filter: ignore quick accidental brushes */
  if (board.settings.hold && (Date.now() - lastDown) < board.settings.hold) return;
  if (b.t === "a"){
    if (b.a === "clear"){ sent = []; renderSent(); }
    else if (b.a === "back"){ goBack(); }
    else if (b.a === "spell"){ openSpell(); }
    return;
  }
  if (b.t === "g"){
    if (!sent.length) return;
    var last = sent[sent.length-1];
    var neu = applySuffix(last.say, b.sfx.replace(/^\+/,""));
    last.say = neu; last.l = neu; last.au = null;
    renderSent();
    logWord(neu);
    if (board.settings.instant) speak(neu);
    return;
  }
  if (b.t === "f"){
    if (b.sp){ pushWord(b); }
    stack.push(cur); cur = b.tg;
    if (!board.pages[cur]){ board.pages[cur] = stubPage(b.l); save(); }
    render();
    return;
  }
  pushWord(b);
  guideCheck(cur, idx);
}
function pushWord(b){
  var it = { l:b.l, say:(b.s || b.l), e:b.e, img:b.img, au:(b.au || null), c:(b.c || "w") };
  sent.push(it);
  renderSent();
  logWord(it.say);
  if (board.settings.instant) playItems([it]);
}
function goBack(){
  if (stack.length){ cur = stack.pop(); } else { cur = "home"; }
  render();
}
function renderSent(){
  sentEl.innerHTML = "";
  if (!sent.length){ sentEl.innerHTML = '<span class="hint">Tap words to talk…</span>'; return; }

    var c = document.createElement("div");

/* ---------- ARASAAC ---------- */
function arasaacSearch(q, cb){
  var url = "https://api.arasaac.org/api/pictograms/en/search/" + encodeURIComponent(q);
  fetch(url).then(function(r){ return r.ok ? r.json() : []; }).then(function(list){
    list = (list || []).slice();
    list.sort(function(a,b2){ return (b2.aac?2:0)+(b2.aacColor?1:0) - ((a.aac?2:0)+(a.aacColor?1:0)); });
    cb(list.slice(0, 16).map(function(it){
      return "https://static.arasaac.org/pictograms/" + it._id + "/" + it._id + "_300.png";
    }));
  }).catch(function(){ cb(null); });
}
function urlToDataURL(url, maxPx, cb){
  fetch(url).then(function(r){ return r.blob(); }).then(function(blob){
    var fr = new FileReader();
    fr.onload = function(){
      var img = new Image();
      img.onload = function(){
        var sc = Math.min(1, maxPx / Math.max(img.width, img.height));
        var cv = document.createElement("canvas");
        cv.width = Math.round(img.width*sc); cv.height = Math.round(img.height*sc);
        cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
        try { cb(cv.toDataURL("image/png")); } catch(e){ cb(null); }
      };
      img.onerror = function(){ cb(null); };
      img.src = fr.result;
    };
    fr.onerror = function(){ cb(null); };
    fr.readAsDataURL(blob);
  }).catch(function(){ cb(null); });
}

/* ---------- bulk symbol download ---------- */
function bulkSymbols(){
  var queue = [];
  Object.keys(board.pages).forEach(function(pk){
    var cells = board.pages[pk].cells;
    Object.keys(cells).forEach(function(ci){
      var b = cells[ci];
      if (b && (b.t==="w" || b.t==="f") && !(b.img && b.img.d)) queue.push(b);
    });
  });
  if (!queue.length){ toast("All buttons already have symbols."); return; }
  openOv('<h3>Getting real symbols</h3><p class="sub">Downloading from ARASAAC and saving on this device so they work offline.</p>' +
    '<div id="bp" style="font-size:15px;font-weight:600">0 / '+queue.length+'</div>' +
    '<div style="height:10px;background:var(--soft);border-radius:99px;margin-top:8px"><div id="bbar" style="height:10px;width:0%;background:var(--accent);border-radius:99px"></div></div>' +
    '<div class="btnrow"><button class="btn" id="bstop">Stop</button></div>');
  var i = 0, stopped = false, got = 0;
  ovbox.querySelector("#bstop").addEventListener("click", function(){ stopped = true; closeOv(); save(); render(); });
  function step(){
    if (stopped) return;
    if (i >= queue.length){
      save(); render(); closeOv();
      toast("Done — "+got+" symbols saved for offline use.");
      return;
    }
    var b = queue[i++];
    var el1 = ovbox.querySelector("#bp"), el2 = ovbox.querySelector("#bbar");
    if (el1){ el1.textContent = i+" / "+queue.length+"  ("+esc(b.l)+")"; el2.style.width = Math.round(i/queue.length*100)+"%"; }
    arasaacSearch(b.l, function(urls){
      if (urls && urls.length){
        urlToDataURL(urls[0], 220, function(durl){
          if (durl){ b.img = { d:durl }; got++; }
          setTimeout(step, 120);
        });
      } else setTimeout(step, 120);
    });
  }
  step();
}

/* board doc stays under Firestore's 1MB limit: images/recordings are split into media docs */
function stripMedia(){
  var media = {};
  Object.keys(board.pages).forEach(function(pk){
    var cells = board.pages[pk].cells;
    Object.keys(cells).forEach(function(ci){
      var b = cells[ci];
      if (b.img && b.img.d && !b.img.id) b.img.id = genId("m");
      if (b.au && !b.auId) b.auId = genId("a");
    });
  });
  var clean = JSON.parse(JSON.stringify(board));
  Object.keys(board.pages).forEach(function(pk){
    var cells = board.pages[pk].cells;
    Object.keys(cells).forEach(function(ci){
      var b = cells[ci], cb2 = clean.pages[pk].cells[ci];
      if (b.img && b.img.d && b.img.id){ media[b.img.id] = b.img.d; cb2.img = { id: b.img.id }; }
      if (b.au && b.auId){ media[b.auId] = b.au; cb2.au = null; cb2.auRef = b.auId; }
    });
  });
  delete clean.settings; delete clean.pin;
  return { clean: clean, media: media };
}
function resolveMedia(clean, cb){
  var local = {};
  Object.keys(board.pages || {}).forEach(function(pk){
    var cs = board.pages[pk].cells;
    Object.keys(cs).forEach(function(ci){
      var b = cs[ci];
      if (b.img && b.img.id && b.img.d) local[b.img.id] = b.img.d;
      if (b.auId && b.au) local[b.auId] = b.au;
    });
  });
  var need = {};
  Object.keys(clean.pages).forEach(function(pk){
    var cs = clean.pages[pk].cells;
    Object.keys(cs).forEach(function(ci){
      var b = cs[ci];
      if (b.img && b.img.id){ if (local[b.img.id]) b.img.d = local[b.img.id]; else need[b.img.id] = true; }
      if (b.auRef){ if (local[b.auRef]){ b.au = local[b.auRef]; b.auId = b.auRef; } else need[b.auRef] = true; }
    });
  });
  var ids = Object.keys(need), got = {};
  if (!ids.length){ cb(clean); return; }
  var i = 0;
  function fin(){
    Object.keys(clean.pages).forEach(function(pk){
      var cs = clean.pages[pk].cells;
      Object.keys(cs).forEach(function(ci){
        var b = cs[ci];
        if (b.img && b.img.id && got[b.img.id]) b.img.d = got[b.img.id];
        if (b.auRef && got[b.auRef]){ b.au = got[b.auRef]; b.auId = b.auRef; }
      });
    });
    cb(clean);
  }
  function step(){
    if (i >= ids.length){ fin(); return; }
    var id = ids[i++];
    db.collection("families").doc(dev.code).collection("media").doc(id).get()
      .then(function(snap){ if (snap.exists) got[id] = snap.data().d; step(); })
      .catch(step);
  }
  step();
}
function schedulePush(){
  if (!syncOn || applyingRemote) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushBoard, 1500);
}
function pushBoard(){
  if (!syncOn || !db) return;
  setStatus("Syncing…");
  var sm = stripMedia();
  try { localStorage.setItem(LS_KEY, JSON.stringify(board)); } catch(e){}
  var ids = Object.keys(sm.media).filter(function(id){ return !pushedIds[id]; });
  var i = 0;
  function step(){
    if (i >= ids.length){
      db.collection("families").doc(dev.code)
        .set({ board: JSON.stringify(sm.clean), rev: Date.now(), src: dev.id })
        .then(function(){ setStatus("Synced ✓"); })
        .catch(function(){ setStatus("Sync error — will retry on next change"); });
      return;
    }
    var id = ids[i++];
    db.collection("families").doc(dev.code).collection("media").doc(id).set({ d: sm.media[id] })
      .then(function(){
        pushedIds[id] = 1;
        try { localStorage.setItem("tb_pushed", JSON.stringify(pushedIds)); } catch(e){}
        step();
      }).catch(step);
  }
  step();
}
function startListen(){
  if (unsubBoard) unsubBoard();
  unsubBoard = db.collection("families").doc(dev.code).onSnapshot(function(snap){
    if (!snap.exists) return;
    var d = snap.data();
    if (d.src === dev.id) return;
    try {
      var clean = JSON.parse(d.board);
      applyingRemote = true;
      resolveMedia(clean, function(nb){
        nb.settings = board.settings; nb.pin = board.pin;
        if (!nb.targets) nb.targets = board.targets || [];
        board = nb;
        try { localStorage.setItem(LS_KEY, JSON.stringify(board)); } catch(e){}

        renderSent(); render();

function remoteReport(){
  openOv('<h3>📊 Weekly report</h3><p class="sub">Loading from your family…</p>');
  var cutoff = dkey(new Date(Date.now() - 14*864e5));
  var wkAgo = dkey(new Date(Date.now() - 7*864e5));

      var d = ds.data(), counts = d.counts || {};
      var isThis = d.d > wkAgo;
      Object.keys(counts).forEach(function(w){
        var n = counts[w] || 0;
        if (isThis){ cT[w] = (cT[w]||0)+n; totT += n; dayTot[d.d] = (dayTot[d.d]||0)+n; }
        else { cL[w] = (cL[w]||0)+n; totL += n; }
      });

      '<p class="sub">'+totT+' words spoken this week'+(totL ? ' ('+totL+' last week)' : '')+'</p>' +
      '<label>Words per day</label><div style="display:flex;align-items:flex-end;gap:4px;height:74px">'+days+'</div>' +

function openReport(){
  if (dev.role === "parent" && syncOn && db){ remoteReport(); return; }
  var now = Date.now(), wk = 7*864e5;
  var log = getLog();
  var thisW = log.filter(function(e){ return e.t > now-wk; });
  var lastW = log.filter(function(e){ return e.t <= now-wk && e.t > now-2*wk; });
  function countBy(arr){
    var m = {};
    arr.forEach(function(e){ var k = e.w.toLowerCase(); m[k] = (m[k]||0)+1; });
    return m;
  }
  var cT = countBy(thisW), cL = countBy(lastW);
  var top = Object.keys(cT).sort(function(a,b){ return cT[b]-cT[a]; }).slice(0,10);
  var maxN = top.length ? cT[top[0]] : 1;
  var topHtml = top.length ? top.map(function(w){
    return '<div style="display:flex;align-items:center;gap:8px;margin:3px 0"><div style="width:90px;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(w)+'</div>' +
      '<div style="flex:1;height:14px;background:var(--soft);border-radius:99px"><div style="height:14px;border-radius:99px;background:var(--accent);width:'+Math.max(6, Math.round(cT[w]/maxN*100))+'%"></div></div>' +
      '<div style="width:34px;text-align:right;font-size:13px">'+cT[w]+'</div></div>';
  }).join("") : '<div class="note">No taps recorded yet this week.</div>';
  /* per-day mini chart */
  var days = "", maxD = 1, dcounts = [];
  for (var i=6; i>=0; i--){
    var d0 = new Date(); d0.setHours(0,0,0,0); d0 = d0.getTime() - i*864e5;
    var n = log.filter(function(e){ return e.t >= d0 && e.t < d0+864e5; }).length;
    dcounts.push({ t:d0, n:n }); if (n > maxD) maxD = n;

function wordIndex(){

      var b = cs[ci];

}
function tokenKey(t){ return t.toLowerCase().replace(/[^a-z0-9''-]/g,""); }

/* after saving a story: offer to add words that are not on the board yet */
function storyMissing(text){
  var ix = wordIndex();
  var seen = {}, missing = [];
  text.split(/\s+/).forEach(function(t){
    var k = tokenKey(t);
    if (k && !ix[k] && !seen[k]){ seen[k] = 1; missing.push(k); }
  });
  if (!missing.length){ openStories(); return; }
  var destOpts = Object.keys(board.pages).map(function(k){
    return '<option value="'+k+'">'+esc(board.pages[k].name)+'</option>';
  }).join("");
  openOv('<h3>Words not on his board yet</h3><p class="sub">Skipped words are simply read aloud during the story. Or make them real buttons — tap a word to keep or skip it, then pick a page. They fill empty slots only.</p>' +

    '<label>Add them to…</label><select id="mwdest">'+destOpts+'</select>' +
    '<div class="btnrow"><button class="btn" id="mwskip">Skip all</button><button class="btn primary" id="mwadd">Add selected</button></div>');
  var picked = missing.map(function(w){ return { w:w, on:true }; });

    var el = ovbox.querySelector("#mwlist"); el.innerHTML = "";

      bt.textContent = p.w;

      el.appendChild(bt);
    });
  }
  rw();
  ovbox.querySelector("#mwskip").addEventListener("click", openStories);

      var idx = firstEmpty(dest, at);
      if (idx < 0) return;
      board.pages[dest].cells[idx] = W(p.w, "⬜");
      at = idx + 1; added++;
    });
    save();
    toast(added + " added to “" + board.pages[dest].name + "” — Settings → Get real symbols will picture them.");
    openStories();
  });
}
/* guided read-along: lights the real path on the board (eat -> Fruit -> kiwi) */
var guide = null;
function bfsPath(wordKey){
  var prev = { home: null }, q = ["home"];
  while (q.length){
    var p = q.shift();
    var cells = board.pages[p] ? board.pages[p].cells : {};
    var ci, b;
    for (ci in cells){
      b = cells[ci];
      if (b.t === "w" && b.l.toLowerCase() === wordKey){
        var steps = [{ page: p, idx: parseInt(ci,10) }];
        var node = p;
        while (prev[node]){ steps.unshift(prev[node]); node = prev[node].page; }
        return steps;
      }
    }
    for (ci in cells){
      b = cells[ci];
      if (b.t === "f" && board.pages[b.tg] && !(b.tg in prev)){
        prev[b.tg] = { page: p, idx: parseInt(ci,10) };
        q.push(b.tg);
      }
    }
  }
  return null;
}
function playStory(s){
  closeOv();
  cur = "home"; stack = [];
  guide = { title: s.title, toks: s.text.split(/\s+/).filter(Boolean), pos: -1, path: null };
  advanceGuide();
}
function updateGuideBar(){
  var gb = document.getElementById("guidebar");
  if (!guide){ gb.style.display = "none"; gb.innerHTML = ""; return; }
  gb.style.display = "flex";
  gb.innerHTML = '📖 <span>' + esc(guide.title) + '</span>&nbsp;·&nbsp;find: <span class="gword">' + esc(guide.toks[guide.pos]) + '</span>' +
    '<span style="color:var(--muted)">' + (guide.pos + 1) + ' / ' + guide.toks.length + '</span>' +
    '<button id="gstopb">✕ Stop</button>';
  document.getElementById("gstopb").addEventListener("click", endGuide);
}
function endGuide(){
  guide = null;
  updateGuideBar();
  render();
}
function advanceGuide(){
  var lead = [];
  while (true){
    guide.pos++;
    if (guide.pos >= guide.toks.length){
      if (lead.length) speak(lead.join(" "));
      finishGuide(); return;
    }
    var tok = guide.toks[guide.pos];
    var key = tokenKey(tok);
    var path = key ? bfsPath(key) : null;
    if (!path){ lead.push(tok); continue; }   /* words not on the board are read aloud automatically */
    guide.path = path;
    break;
  }
  var leadTxt = lead.join(" ");
  setTimeout(function(){
    if (!guide) return;
    var pr = board.settings.storyPrompts !== false;
    if (leadTxt) speakAsync(leadTxt, function(){ if (guide && pr) speak("Find " + guide.toks[guide.pos]); });
    else if (pr) speak("Find " + guide.toks[guide.pos]);
  }, 1500);
  updateGuideBar();
  render();
}
function finishGuide(){
  guide = null; updateGuideBar(); render();
  openOv('<h3>📖 The end!</h3><div style="text-align:center;font-size:42px;margin:10px 0">🎉 ⭐ 🎉</div><p class="sub" style="text-align:center;font-size:15px">Great reading!</p><div class="btnrow"><button class="btn primary" id="stdone">Done</button></div>');
  setTimeout(function(){ speak("The end! Great reading!"); }, 1200);
  ovbox.querySelector("#stdone").addEventListener("click", closeOv);
}
function guideGlow(){
  var hb = document.getElementById("homeBtn");
  hb.classList.remove("guide-glow");
  if (!guide || !guide.path) return;
  var stepIdx = null;
  for (var i = 0; i < guide.path.length; i++){
    if (guide.path[i].page === cur){ stepIdx = guide.path[i].idx; break; }
  }
  if (stepIdx !== null){
    var el = grid.querySelector('[data-idx="' + stepIdx + '"]');
    if (el) el.classList.add("guide-glow");
    return;
  }
  var cells = board.pages[cur].cells, backIdx = null;
  Object.keys(cells).forEach(function(ci){
    if (backIdx === null && cells[ci].t === "a" && cells[ci].a === "back") backIdx = ci;
  });
  if (backIdx !== null){
    var el2 = grid.querySelector('[data-idx="' + backIdx + '"]');
    if (el2) el2.classList.add("guide-glow");
  } else hb.classList.add("guide-glow");
}
function guideCheck(pageAtTap, idx){
  if (!guide || !guide.path) return;
  var last = guide.path[guide.path.length - 1];
  if (pageAtTap === last.page && idx === last.idx) advanceGuide();
}

var GK = "tb_stars";
function getStars(){ try { return parseInt(localStorage.getItem(GK),10) || 0; } catch(e){ return 0; } }
function addStar(){ try { localStorage.setItem(GK, String(getStars()+1)); } catch(e){} }
var gStreak = 0, gCount = 4;
function gamePool(){
  var ix = wordIndex();
  return Object.keys(ix).map(function(k){ return ix[k]; }).filter(function(b){
    return (b.img && (b.img.d || b.img.u)) || (b.e && b.e !== "⬜" && b.e !== "");
  });
}
document.getElementById("gameBtn").addEventListener("click", openGame);
function openGame(){
  gStreak = 0; gCount = 4;
  openOv('<h3>🎲 Find it!</h3><p class="sub">Listen, then tap the right picture. You have ⭐ '+getStars()+' stars!</p>' +
    '<div class="btnrow"><button class="btn primary" id="ggo">▶ Play</button><button class="btn" id="gc">Close</button></div>');
  ovbox.querySelector("#ggo").addEventListener("click", gameRound);
  ovbox.querySelector("#gc").addEventListener("click", closeOv);
}
function gameRound(){
  var pool = gamePool();
  if (pool.length < 4){ toast("Add a few more picture buttons to play."); closeOv(); return; }
  var target = null;
  if (board.targets.length && Math.random() < 0.4){
    var tset = board.targets.map(function(t){ return t.toLowerCase(); });
    var hits = pool.filter(function(b){ return tset.indexOf(b.l.toLowerCase()) >= 0; });
    if (hits.length) target = hits[Math.floor(Math.random()*hits.length)];
  }
  if (!target) target = pool[Math.floor(Math.random()*pool.length)];
  var opts = [target], guard = 0;
  while (opts.length < Math.min(gCount, pool.length) && guard++ < 300){
    var c = pool[Math.floor(Math.random()*pool.length)];
    if (!opts.some(function(o){ return o.l === c.l; })) opts.push(c);
  }
  for (var i = opts.length-1; i > 0; i--){
    var j = Math.floor(Math.random()*(i+1));
    var tmp = opts[i]; opts[i] = opts[j]; opts[j] = tmp;
  }
  var colsN = opts.length <= 4 ? 2 : 3;
  var tiles = opts.map(function(b){
    var pc = palColors(b.c);
    var pic = (b.img && (b.img.d || b.img.u))
      ? '<img src="'+(b.img.d || b.img.u)+'" style="max-width:72%;max-height:66%;object-fit:contain" alt="">'
      : '<span style="font-size:42px">'+(b.e||"")+'</span>';
    return '<button class="gtile" data-l="'+esc(b.l)+'" style="background:'+pc[0]+';--edge:'+pc[1]+'">'+pic+'</button>';
  }).join("");
  openOv('<h3>🎲 Find it! <span style="float:right;font-size:14px;font-weight:600">⭐ '+getStars()+'</span></h3>' +
    '<div style="display:flex;align-items:center;gap:8px;margin:6px 0">' +
      '<button class="btn ghost" id="ghear" style="flex:0 0 auto;padding:8px 14px">🔊</button>' +
      '<div style="font-size:19px;font-weight:700">Find: '+esc(target.l)+'</div></div>' +
    '<div style="display:grid;grid-template-columns:repeat('+colsN+',1fr);gap:10px">'+tiles+'</div>' +
    '<div class="btnrow"><button class="btn" id="gstop">Done playing</button></div>');
  function say(){ speak("Find " + target.l); }
  say();
  ovbox.querySelector("#ghear").addEventListener("click", say);
  ovbox.querySelector("#gstop").addEventListener("click", closeOv);
  var solved = false;
  Array.prototype.forEach.call(ovbox.querySelectorAll(".gtile"), function(bt){
    bt.addEventListener("click", function(){
      if (solved) return;
      if (bt.getAttribute("data-l") === target.l){
        solved = true;
        addStar(); gStreak++;
        if (gStreak === 3 && gCount < 6) gCount = 6;
        else if (gStreak === 6 && gCount < 9) gCount = 9;
        bt.style.outline = "4px solid var(--good)";
        bt.style.transform = "scale(1.06)";
        speak("Yes! " + target.l + "!");
        setTimeout(gameRound, 1100);
      } else {
        gStreak = 0;
        bt.style.opacity = .3;
        say();
      }
    });
  });
}

}
document.getElementById("importIn").addEventListener("change", function(){
  var f = this.files && this.files[0]; this.value = "";
  if (!f) return;
  var fr = new FileReader();
  fr.onload = function(){
    try {
      var nb = JSON.parse(fr.result);
      if (!nb || !nb.pages || !nb.pages.home) throw 0;
      board = nb; ensureShape(); save(); cur="home"; stack=[]; sent=[]; renderSent(); render(); closeOv();
      toast("Board imported.");
    } catch(e){ toast("That file isn’t a TalkBoard backup."); }
  };
  fr.readAsText(f);
});

/* ---------- init ---------- */
loadDev();
applyTheme();
load();
ensureShape();
renderSent();
render();
if (dev.fb && dev.code){
  setStatus("Connecting…");
  initFirebase(function(err){
    if (err){ setStatus("Sync offline — device still works"); return; }
    syncOn = true; startListen(); setStatus("Synced ✓");
  });
}
})();
</script>
</body>
